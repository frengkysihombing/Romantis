<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>💖 Mia & Frengky • Cinta Abadi 💖</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@300;400;600;700&family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Quicksand', sans-serif;
      background: linear-gradient(145deg, #f5e6e8 0%, #f8e8ff 100%);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 1.5rem;
      margin: 0;
      position: relative;
      overflow-x: hidden;
    }

    .rain-container {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 0;
      overflow: hidden;
    }
    .rain-heart {
      position: absolute;
      font-size: 1.8rem;
      color: rgba(232, 67, 110, 0.15);
      animation: rainFall linear infinite;
      pointer-events: none;
      user-select: none;
    }
    @keyframes rainFall {
      0% { transform: translateY(-10vh) rotate(0deg) scale(0.8); opacity: 0.2; }
      10% { opacity: 0.6; }
      90% { opacity: 0.6; }
      100% { transform: translateY(110vh) rotate(720deg) scale(1.3); opacity: 0; }
    }

    .floating-hearts {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 0;
      overflow: hidden;
    }
    .heart-float {
      position: absolute;
      color: rgba(255, 80, 120, 0.06);
      font-size: 2.5rem;
      animation: floatUp 20s infinite linear;
      transform: translateY(100vh);
    }
    @keyframes floatUp {
      0% { transform: translateY(100vh) rotate(0deg); opacity: 0.1; }
      10% { opacity: 0.3; }
      90% { opacity: 0.3; }
      100% { transform: translateY(-10vh) rotate(720deg); opacity: 0; }
    }

    .card {
      position: relative;
      z-index: 10;
      max-width: 700px;
      width: 100%;
      background: rgba(255, 248, 250, 0.85);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-radius: 48px;
      padding: 2.5rem 2rem 2.5rem;
      box-shadow: 0 30px 80px rgba(180, 60, 100, 0.2), 0 10px 30px rgba(180, 60, 100, 0.1);
      border: 1px solid rgba(255, 215, 220, 0.5);
      text-align: center;
    }

    .invitation-border {
      position: relative;
      border: 2px solid rgba(200, 130, 150, 0.3);
      border-radius: 32px;
      padding: 1.5rem 1.5rem 1.8rem;
      background: linear-gradient(135deg, rgba(255,245,247,0.5), rgba(255,235,240,0.3));
      box-shadow: inset 0 0 60px rgba(200, 130, 150, 0.05);
    }

    .ornament-top {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 12px;
      margin-bottom: 0.5rem;
      color: #c4879a;
      font-size: 1.2rem;
      letter-spacing: 2px;
      font-family: 'Playfair Display', serif;
      font-style: italic;
    }
    .ornament-top .line {
      flex: 1;
      height: 1px;
      background: linear-gradient(to right, transparent, #d4a0b0, transparent);
      max-width: 80px;
    }
    .ornament-top i {
      color: #d4a0b0;
      font-size: 1rem;
    }

    .title {
      font-family: 'Playfair Display', serif;
      font-weight: 700;
      font-size: 2.2rem;
      letter-spacing: -0.5px;
      margin-bottom: 0.1rem;
      background: linear-gradient(135deg, #a86078, #c4879a, #d4a0b0);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      text-shadow: none;
    }
    .subtitle {
      font-family: 'Playfair Display', serif;
      font-style: italic;
      font-weight: 400;
      font-size: 0.9rem;
      color: #a07080;
      background: rgba(255, 220, 230, 0.3);
      display: inline-block;
      padding: 0.2rem 2rem;
      border-radius: 40px;
      backdrop-filter: blur(4px);
      margin-bottom: 1.2rem;
      border: 1px solid rgba(200, 150, 165, 0.2);
      letter-spacing: 1px;
    }

    .slideshow-container {
      position: relative;
      width: 100%;
      border-radius: 24px;
      overflow: visible;
      aspect-ratio: 4 / 3;
      background: transparent;
      padding: 8px;
    }

    .paper-frame {
      position: relative;
      width: 100%;
      height: 100%;
      border-radius: 20px;
      background: #fcf6f8;
      box-shadow: 
        0 2px 4px rgba(180, 60, 100, 0.05),
        0 8px 25px rgba(180, 60, 100, 0.08),
        inset 0 0 40px rgba(200, 130, 150, 0.03);
      padding: 12px;
      border: 1px solid rgba(220, 190, 200, 0.3);
    }

    .paper-frame::before,
    .paper-frame::after {
      content: '';
      position: absolute;
      width: 40px;
      height: 40px;
      border-color: #d4a0b0;
      border-style: solid;
      border-width: 0;
      opacity: 0.5;
      pointer-events: none;
    }
    .paper-frame::before {
      top: 8px;
      left: 8px;
      border-top-width: 2px;
      border-left-width: 2px;
      border-radius: 4px 0 0 0;
    }
    .paper-frame::after {
      bottom: 8px;
      right: 8px;
      border-bottom-width: 2px;
      border-right-width: 2px;
      border-radius: 0 0 4px 0;
    }

    .corner-deco {
      position: absolute;
      font-size: 1.2rem;
      color: #d4a0b0;
      opacity: 0.4;
      pointer-events: none;
    }
    .corner-deco.tl { top: 4px; left: 12px; }
    .corner-deco.tr { top: 4px; right: 12px; }
    .corner-deco.bl { bottom: 4px; left: 12px; }
    .corner-deco.br { bottom: 4px; right: 12px; }

    .slide {
      position: absolute;
      top: 12px;
      left: 12px;
      width: calc(100% - 24px);
      height: calc(100% - 24px);
      opacity: 0;
      transition: opacity 1s ease-in-out, transform 1s ease-in-out;
      transform: scale(0.98);
      display: flex;
      align-items: center;
      justify-content: center;
      background: #fcf6f8;
      border-radius: 16px;
      pointer-events: none;
      overflow: hidden;
    }
    .slide.active {
      opacity: 1;
      transform: scale(1);
      pointer-events: auto;
    }
    .slide img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      object-position: center;
      border-radius: 12px;
      display: block;
      background: #fcf6f8;
      padding: 4px;
      pointer-events: none;
      filter: drop-shadow(0 2px 8px rgba(0,0,0,0.03));
    }

    /* ★ PERBAIKAN: TOMBOL NAIK AGAR TIDAK TERPOTONG ★ */
    .slide-actions {
      position: absolute;
      bottom: 20px;  /* ← dinaikkan dari -10px menjadi 20px */
      left: 0;
      right: 0;
      display: flex;
      justify-content: center;
      gap: 16px;
      z-index: 999;
      flex-wrap: wrap;
      padding: 0 12px;
      opacity: 0;
      transform: translateY(20px);
      transition: all 0.6s cubic-bezier(0.34, 1.56, 0.64, 1) 0.3s;
      pointer-events: none;
    }
    .slide.active .slide-actions {
      opacity: 1;
      transform: translateY(0);
      pointer-events: auto;
    }

    .love-btn-overlay {
      background: linear-gradient(135deg, rgba(255,255,255,0.85), rgba(255,245,248,0.9));
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1.5px solid rgba(200, 150, 165, 0.3);
      color: #5a3a4a;
      padding: 14px 28px;
      border-radius: 60px;
      font-weight: 700;
      font-size: 1rem;
      cursor: pointer;
      transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
      display: inline-flex;
      align-items: center;
      gap: 10px;
      box-shadow: 0 8px 30px rgba(180, 60, 100, 0.15), 0 0 20px rgba(200,130,150,0.05);
      text-shadow: 0 1px 2px rgba(255,255,255,0.5);
      position: relative;
      z-index: 1000;
      pointer-events: auto !important;
      letter-spacing: 0.3px;
      font-family: 'Playfair Display', serif;
    }
    .love-btn-overlay i {
      font-size: 1.1rem;
      color: #c4879a;
    }
    .love-btn-overlay:hover {
      transform: scale(1.08) translateY(-4px);
      background: rgba(255, 255, 255, 0.95);
      box-shadow: 0 12px 40px rgba(180, 60, 100, 0.25);
      border-color: #d4a0b0;
    }
    .love-btn-overlay:active {
      transform: scale(0.94);
    }

    .love-btn-overlay.special {
      background: linear-gradient(135deg, rgba(200,130,150,0.2), rgba(232,67,110,0.15));
      border-color: rgba(200, 130, 150, 0.4);
    }
    .love-btn-overlay.special:hover {
      background: linear-gradient(135deg, rgba(200,130,150,0.3), rgba(232,67,110,0.25));
      box-shadow: 0 12px 40px rgba(180, 60, 100, 0.3);
    }

    .slide-caption {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      padding: 1.2rem 1.5rem 0.8rem;
      background: linear-gradient(to bottom, rgba(0,0,0,0.3) 0%, transparent 100%);
      color: white;
      text-align: left;
      font-weight: 600;
      font-size: 1rem;
      opacity: 0;
      transition: opacity 0.6s ease;
      pointer-events: none;
      border-radius: 12px 12px 0 0;
      z-index: 10;
      font-family: 'Playfair Display', serif;
      font-style: italic;
    }
    .slide.active .slide-caption {
      opacity: 1;
    }
    .slide-caption i { color: #ffb6c9; margin-right: 8px; }
    .slide-caption small {
      display: block;
      font-weight: 300;
      font-size: 0.7rem;
      opacity: 0.7;
      margin-top: 2px;
      font-style: normal;
      font-family: 'Quicksand', sans-serif;
    }

    .nav-btn {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      background: rgba(255, 255, 255, 0.3);
      backdrop-filter: blur(6px);
      border: 1px solid rgba(255, 255, 255, 0.4);
      color: #5a3a4a;
      width: 38px;
      height: 38px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      font-size: 1rem;
      transition: all 0.3s ease;
      z-index: 20;
      opacity: 0;
      pointer-events: none;
      box-shadow: 0 2px 12px rgba(0,0,0,0.05);
    }
    .slideshow-container:hover .nav-btn,
    .slideshow-container:active .nav-btn {
      opacity: 0.7;
      pointer-events: auto;
    }
    .nav-btn:hover {
      background: rgba(255, 255, 255, 0.6);
      transform: translateY(-50%) scale(1.1);
      opacity: 1;
    }
    .nav-btn.prev { left: 4px; }
    .nav-btn.next { right: 4px; }

    .dots-container {
      display: flex;
      justify-content: center;
      gap: 10px;
      margin: 1.8rem 0 0.5rem;
    }
    .dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: rgba(200, 150, 165, 0.3);
      border: 1px solid rgba(200, 150, 165, 0.1);
      cursor: pointer;
      transition: all 0.4s ease;
      padding: 0;
    }
    .dot.active {
      background: #c4879a;
      transform: scale(1.3);
      box-shadow: 0 0 16px rgba(196, 135, 154, 0.4);
      border-color: #c4879a;
    }

    .ornament-bottom {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 12px;
      margin-top: 0.8rem;
      color: #c4879a;
      font-size: 0.9rem;
      font-family: 'Playfair Display', serif;
      font-style: italic;
    }
    .ornament-bottom .line {
      flex: 1;
      height: 1px;
      background: linear-gradient(to right, transparent, #d4a0b0, transparent);
      max-width: 60px;
    }
    .ornament-bottom i {
      color: #d4a0b0;
      font-size: 0.9rem;
    }

    .music-control {
      margin-top: 1.2rem;
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 0.8rem;
      background: rgba(255, 240, 245, 0.4);
      padding: 0.3rem 1.2rem;
      border-radius: 60px;
      backdrop-filter: blur(4px);
      border: 1px solid rgba(200, 150, 165, 0.15);
    }
    .music-btn {
      background: none;
      border: none;
      font-size: 1.2rem;
      cursor: pointer;
      color: #a07080;
      transition: 0.2s;
      padding: 0.2rem 0.6rem;
      border-radius: 40px;
    }
    .music-btn:hover { background: rgba(255, 200, 210, 0.2); transform: scale(1.1); }
    .music-label {
      font-size: 0.7rem;
      color: #a07080;
      font-weight: 600;
      letter-spacing: 0.5px;
      font-family: 'Playfair Display', serif;
      font-style: italic;
    }

    .romantic-output {
      margin-top: 1rem;
      min-height: 45px;
      display: flex;
      justify-content: center;
      align-items: center;
    }
    .love-message {
      background: rgba(255, 240, 245, 0.4);
      backdrop-filter: blur(8px);
      padding: 0.5rem 1.4rem;
      border-radius: 60px;
      font-weight: 600;
      color: #5a3a4a;
      font-size: 0.85rem;
      border: 1px solid rgba(200, 150, 165, 0.15);
      animation: fadePop 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-family: 'Playfair Display', serif;
      font-style: italic;
    }
    .love-message i { color: #c4879a; }
    @keyframes fadePop {
      0% { opacity: 0; transform: scale(0.8); }
      100% { opacity: 1; transform: scale(1); }
    }

    .rain-burst {
      position: fixed;
      pointer-events: none;
      font-size: 2.5rem;
      z-index: 999;
      animation: burstLove 1.8s ease-out forwards;
    }
    @keyframes burstLove {
      0% { opacity: 1; transform: translate(0,0) scale(0.3) rotate(0deg); }
      50% { opacity: 1; transform: translate(var(--tx), var(--ty)) scale(1.2) rotate(180deg); }
      100% { opacity: 0; transform: translate(calc(var(--tx)*1.5), calc(var(--ty)*1.5)) scale(2.5) rotate(360deg); }
    }

    .floating-emoji {
      position: fixed;
      pointer-events: none;
      font-size: 2rem;
      z-index: 999;
      animation: floatEmoji 2.2s ease-out forwards;
    }
    @keyframes floatEmoji {
      0% { opacity: 1; transform: translateY(0) scale(0.6); }
      100% { opacity: 0; transform: translateY(-250px) scale(2) rotate(40deg); }
    }

    @media (max-width: 480px) {
      .card { padding: 1.2rem 1rem; border-radius: 32px; }
      .title { font-size: 1.6rem; }
      .invitation-border { padding: 1rem 0.8rem 1.2rem; }
      .paper-frame { padding: 8px; }
      .paper-frame::before, .paper-frame::after { width: 28px; height: 28px; }
      .slide { top: 8px; left: 8px; width: calc(100% - 16px); height: calc(100% - 16px); }
      .nav-btn { width: 30px; height: 30px; font-size: 0.8rem; }
      .love-btn-overlay { font-size: 0.75rem; padding: 10px 16px; gap: 6px; }
      .love-btn-overlay i { font-size: 0.8rem; }
      .slide-actions { bottom: 12px; gap: 8px; } /* ← perbaikan di HP */
      .slide-caption { font-size: 0.8rem; padding: 0.8rem 1rem 0.5rem; }
      .ornament-top, .ornament-bottom { font-size: 0.8rem; }
      .ornament-top .line, .ornament-bottom .line { max-width: 40px; }
    }
    @media (max-width: 380px) {
      .love-btn-overlay { font-size: 0.65rem; padding: 8px 12px; gap: 4px; }
      .love-btn-overlay i { font-size: 0.7rem; }
      .slide-actions { bottom: 8px; gap: 6px; }
    }
  </style>
</head>
<body>

  <div class="rain-container" id="rainContainer"></div>
  <div class="floating-hearts" id="floatingHearts"></div>

  <div class="card">

    <div class="ornament-top">
      <span class="line"></span>
      <i class="fas fa-heart"></i>
      <i class="fas fa-star" style="font-size:0.7rem;"></i>
      <i class="fas fa-heart"></i>
      <span class="line"></span>
    </div>

    <h1 class="title">💖 Mia & Frengky 💖</h1>
    <div class="subtitle"><i class="fas fa-feather-alt" style="color:#c4879a; margin-right:6px;"></i> LDR • Cinta Sejati <i class="fas fa-feather-alt" style="color:#c4879a; margin-left:6px;"></i></div>

    <div class="slideshow-container" id="slideshowContainer">

      <div class="paper-frame">
        <span class="corner-deco tl">❧</span>
        <span class="corner-deco tr">❧</span>
        <span class="corner-deco bl">❧</span>
        <span class="corner-deco br">❧</span>

        <div class="slide active" data-index="0">
          <img src="foto1.jpg" alt="Kenangan 1" loading="lazy">
          <div class="slide-caption">
            <i class="fas fa-heart"></i> Pertama kali bertemu
            <small>Momen yang tak terlupakan</small>
          </div>
          <div class="slide-actions">
            <button class="love-btn-overlay" data-msg="💕 Kenangan manis pertama kali kita bertemu, Mia. Aku takkan pernah melupakannya."><i class="fas fa-heart"></i> Kenangan</button>
            <button class="love-btn-overlay special" data-msg="🌹 Senyummu di hari itu membuat hatiku bergetar, Frengky. Aku langsung jatuh cinta."><i class="fas fa-rose"></i> Cinta</button>
          </div>
        </div>

        <div class="slide" data-index="1">
          <img src="foto2.jpg" alt="Kenangan 2" loading="lazy">
          <div class="slide-caption">
            <i class="fas fa-heart"></i> Tawa dan bahagia
            <small>Setiap detik berharga</small>
          </div>
          <div class="slide-actions">
            <button class="love-btn-overlay" data-msg="💕 Tawa bahagia kita bersama adalah obat rinduku setiap hari, Mia."><i class="fas fa-heart"></i> Bahagia</button>
            <button class="love-btn-overlay special" data-msg="🌟 Kamu adalah bintang yang menerangi setiap hariku, Frengky. Tanpamu gelap."><i class="fas fa-star"></i> Bintang</button>
          </div>
        </div>

        <div class="slide" data-index="2">
          <img src="foto3.jpg" alt="Kenangan 3" loading="lazy">
          <div class="slide-caption">
            <i class="fas fa-heart"></i> Cinta yang tumbuh
            <small>Jarak tak jadi penghalang</small>
          </div>
          <div class="slide-actions">
            <button class="love-btn-overlay" data-msg="💕 Setiap hari aku merindukanmu lebih dalam, Mia. Jarak tak mengurangi cintaku."><i class="fas fa-heart"></i> Rindu</button>
            <button class="love-btn-overlay special" data-msg="🌈 Cinta kita sekuat pelangi, melewati badai LDR dengan indah, Frengky."><i class="fas fa-rainbow"></i> Pelangi</button>
          </div>
        </div>

        <div class="slide" data-index="3">
          <img src="foto4.jpg" alt="Kenangan 4" loading="lazy">
          <div class="slide-caption">
            <i class="fas fa-heart"></i> Sampai jumpa di pelukan
            <small>LDR takkan memisahkan kita</small>
          </div>
          <div class="slide-actions">
            <button class="love-btn-overlay" data-msg="💕 Aku menunggumu dengan sepenuh hati, Mia. Sampai kita bertemu lagi."><i class="fas fa-heart"></i> Tunggu</button>
            <button class="love-btn-overlay special" data-msg="🙏 Semoga cinta kita langgeng sampai i ahti, Frengky. Dalam doa selalu ada kamu."><i class="fas fa-hands-praying"></i> Doa</button>
          </div>
        </div>

        <button class="nav-btn prev" id="prevSlide"><i class="fas fa-chevron-left"></i></button>
        <button class="nav-btn next" id="nextSlide"><i class="fas fa-chevron-right"></i></button>
      </div>
    </div>

    <div class="dots-container" id="dotsContainer">
      <button class="dot active" data-index="0"></button>
      <button class="dot" data-index="1"></button>
      <button class="dot" data-index="2"></button>
      <button class="dot" data-index="3"></button>
    </div>

    <div class="ornament-bottom">
      <span class="line"></span>
      <i class="fas fa-heart"></i>
      <i class="fas fa-infinity" style="font-size:0.8rem;"></i>
      <i class="fas fa-heart"></i>
      <span class="line"></span>
    </div>

    <div class="music-control">
      <button class="music-btn" id="playPauseBtn">
        <i class="fas fa-play" id="playIcon"></i>
      </button>
      <span class="music-label"><i class="fas fa-music"></i> Souqy</span>
      <button class="music-btn" id="volumeToggleBtn">
        <i class="fas fa-volume-up" id="volumeIcon"></i>
      </button>
    </div>

    <div class="romantic-output" id="romanticOutput">
      <div class="love-message">
        <i class="fas fa-heart" style="color:#c4879a;"></i>  Klik tombol cinta di dalam foto  <i class="fas fa-heart" style="color:#c4879a;"></i>
      </div>
    </div>

  </div>

  <audio id="romanticSong" loop preload="auto">
    <source src="https://raw.githubusercontent.com/frengkysihombing/Romantis/dcc093336370164fe887fee660895562a85185fb/Souqy.mp3" type="audio/mpeg">
  </audio>

  <script>
    (function() {

      const rainContainer = document.getElementById('rainContainer');
      const loveSymbols = ['❤️', '💕', '💖', '💗', '💘', '💝', '🌹', '🌸', '✨', '💞'];
      for (let i = 0; i < 40; i++) {
        const el = document.createElement('div');
        el.className = 'rain-heart';
        el.textContent = loveSymbols[Math.floor(Math.random() * loveSymbols.length)];
        el.style.left = Math.random() * 100 + '%';
        el.style.fontSize = (1 + Math.random() * 2.5) + 'rem';
        el.style.animationDuration = (8 + Math.random() * 15) + 's';
        el.style.animationDelay = (Math.random() * 12) + 's';
        el.style.opacity = 0.15 + Math.random() * 0.3;
        rainContainer.appendChild(el);
      }

      const heartsContainer = document.getElementById('floatingHearts');
      const symbols = ['❤️', '💕', '💖', '✨', '🌸', '💗', '🌹'];
      for (let i = 0; i < 25; i++) {
        const el = document.createElement('div');
        el.className = 'heart-float';
        el.textContent = symbols[Math.floor(Math.random() * symbols.length)];
        el.style.left = Math.random() * 100 + '%';
        el.style.fontSize = (1.5 + Math.random() * 3) + 'rem';
        el.style.animationDuration = (14 + Math.random() * 22) + 's';
        el.style.animationDelay = (Math.random() * 20) + 's';
        heartsContainer.appendChild(el);
      }

      const slides = document.querySelectorAll('.slide');
      const dots = document.querySelectorAll('.dot');
      const prevBtn = document.getElementById('prevSlide');
      const nextBtn = document.getElementById('nextSlide');
      let currentIndex = 0;
      let slideInterval;

      function goToSlide(index) {
        if (index < 0) index = slides.length - 1;
        if (index >= slides.length) index = 0;
        slides.forEach((s, i) => s.classList.toggle('active', i === index));
        dots.forEach((d, i) => d.classList.toggle('active', i === index));
        currentIndex = index;
      }

      function nextSlide() { goToSlide(currentIndex + 1); }
      function prevSlide() { goToSlide(currentIndex - 1); }

      prevBtn.addEventListener('click', (e) => { e.stopPropagation(); prevSlide(); resetInterval(); });
      nextBtn.addEventListener('click', (e) => { e.stopPropagation(); nextSlide(); resetInterval(); });
      dots.forEach(dot => {
        dot.addEventListener('click', function() {
          goToSlide(parseInt(this.getAttribute('data-index')));
          resetInterval();
        });
      });

      function startInterval() { slideInterval = setInterval(nextSlide, 4000); }
      function resetInterval() { clearInterval(slideInterval); startInterval(); }

      const container = document.getElementById('slideshowContainer');
      container.addEventListener('mouseenter', () => clearInterval(slideInterval));
      container.addEventListener('mouseleave', startInterval);
      container.addEventListener('touchstart', () => clearInterval(slideInterval));
      container.addEventListener('touchend', startInterval);
      startInterval();

      const audio = document.getElementById('romanticSong');
      const playBtn = document.getElementById('playPauseBtn');
      const playIcon = document.getElementById('playIcon');
      const volumeBtn = document.getElementById('volumeToggleBtn');
      const volumeIcon = document.getElementById('volumeIcon');
      let isPlaying = false, isMuted = false;

      function playAudio(showMsg = true) {
        audio.play().then(() => {
          isPlaying = true;
          playIcon.className = 'fas fa-pause';
          if (showMsg) showLoveBurst('🎵 Sedang memutar lagu Souqy 💖');
        }).catch(() => {
          playIcon.className = 'fas fa-play';
          isPlaying = false;
        });
      }

      setTimeout(() => playAudio(false), 500);
      document.addEventListener('click', function first() {
        if (!isPlaying) playAudio(true);
        document.removeEventListener('click', first);
        document.removeEventListener('touchstart', first);
      }, { once: true });
      document.addEventListener('touchstart', function firstTouch() {
        if (!isPlaying) playAudio(true);
        document.removeEventListener('click', firstTouch);
        document.removeEventListener('touchstart', firstTouch);
      }, { once: true });

      playBtn.addEventListener('click', function(e) {
        e.stopPropagation();
        if (isPlaying) { audio.pause(); playIcon.className = 'fas fa-play'; isPlaying = false; }
        else { playAudio(true); }
      });

      volumeBtn.addEventListener('click', function(e) {
        e.stopPropagation();
        if (isMuted) { audio.muted = false; volumeIcon.className = 'fas fa-volume-up'; isMuted = false; }
        else { audio.muted = true; volumeIcon.className = 'fas fa-volume-mute'; isMuted = true; }
      });
      audio.volume = 0.6;

      function showLoveBurst(msg) {
        const output = document.getElementById('romanticOutput');
        output.innerHTML = '';
        const div = document.createElement('div');
        div.className = 'love-message';
        div.innerHTML = `<i class="fas fa-heart" style="color:#c4879a;"></i> ${msg} <i class="fas fa-heart" style="color:#c4879a;"></i>`;
        output.appendChild(div);

        const emojis = ['❤️', '💕', '💖', '💗', '💘', '💝', '🌹', '🌸', '✨', '💞', '💓', '🥰', '😍', '💋'];
        const colors = ['#e8436e', '#ff6b8a', '#ff8da1', '#ffb6c1', '#d65f7a', '#ff4d7a', '#ff2d55'];

        for (let i = 0; i < 50; i++) {
          setTimeout(() => {
            const el = document.createElement('div');
            el.className = 'rain-burst';
            el.textContent = emojis[Math.floor(Math.random() * emojis.length)];
            el.style.left = (5 + Math.random() * 90) + '%';
            el.style.top = (5 + Math.random() * 90) + '%';
            const tx = (Math.random() * 500 - 250);
            const ty = (Math.random() * -500 - 100);
            el.style.setProperty('--tx', tx + 'px');
            el.style.setProperty('--ty', ty + 'px');
            el.style.fontSize = (1.5 + Math.random() * 3.5) + 'rem';
            el.style.color = colors[Math.floor(Math.random() * colors.length)];
            el.style.textShadow = '0 0 20px rgba(232,67,110,0.3)';
            document.body.appendChild(el);
            setTimeout(() => el.remove(), 1800);
          }, i * 30);
        }

        const floatEmojis = ['💖', '✨', '💕', '🌟', '🥰', '💞', '🌹', '💗', '💘', '😍'];
        for (let i = 0; i < 20; i++) {
          setTimeout(() => {
            const em = document.createElement('div');
            em.className = 'floating-emoji';
            em.textContent = floatEmojis[Math.floor(Math.random() * floatEmojis.length)];
            em.style.left = (5 + Math.random() * 90) + '%';
            em.style.top = (10 + Math.random() * 80) + '%';
            em.style.fontSize = (1.5 + Math.random() * 3) + 'rem';
            em.style.color = colors[Math.floor(Math.random() * colors.length)];
            document.body.appendChild(em);
            setTimeout(() => em.remove(), 2400);
          }, i * 60);
        }

        if (!isPlaying) playAudio(false);
      }

      document.addEventListener('click', function(e) {
        const btn = e.target.closest('.love-btn-overlay');
        if (btn) {
          e.stopPropagation();
          e.preventDefault();
          const msg = btn.getAttribute('data-msg') || '💖 Cinta abadi untuk Mia & Frengky 💖';
          console.log('Tombol diklik:', msg);
          showLoveBurst(msg);
        }
      });

      setTimeout(() => {
        showLoveBurst('💕 Klik tombol cinta di dalam foto untuk pesan romantis 💕');
      }, 800);

    })();
  </script>
</body>
</html>
