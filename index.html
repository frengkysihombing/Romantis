<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>💖 Mia & Frengky • Saranghae 💖</title>
  <!-- Font & Icons -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@300;400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Quicksand', sans-serif;
      background: linear-gradient(145deg, #fce4ec 0%, #f8e8ff 100%);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 1.5rem;
      margin: 0;
      position: relative;
      overflow-x: hidden;
    }

    /* YouTube iframe disembunyikan */
    .youtube-audio {
      position: absolute;
      width: 0;
      height: 0;
      opacity: 0;
      pointer-events: none;
      overflow: hidden;
      z-index: -1;
    }

    .youtube-audio iframe {
      width: 0;
      height: 0;
      border: 0;
    }

    .floating-hearts {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 1;
      overflow: hidden;
    }

    .heart-float {
      position: absolute;
      color: rgba(255, 80, 120, 0.15);
      font-size: 2rem;
      animation: floatUp 12s infinite linear;
      transform: translateY(100vh);
    }

    @keyframes floatUp {
      0% { transform: translateY(100vh) rotate(0deg); opacity: 0.2; }
      10% { opacity: 0.6; }
      90% { opacity: 0.6; }
      100% { transform: translateY(-10vh) rotate(720deg); opacity: 0; }
    }

    .card {
      position: relative;
      z-index: 10;
      max-width: 600px;
      width: 100%;
      background: rgba(255, 255, 255, 0.6);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-radius: 48px;
      padding: 2.2rem 1.8rem;
      box-shadow: 0 30px 60px rgba(200, 80, 120, 0.25), 0 10px 30px rgba(200, 80, 120, 0.15);
      border: 1px solid rgba(255, 255, 255, 0.7);
      transition: all 0.3s ease;
      text-align: center;
    }

    .avatar-section {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 1.2rem;
      margin-bottom: 1.2rem;
      flex-wrap: wrap;
    }

    .avatar {
      width: 85px;
      height: 85px;
      border-radius: 50%;
      display: flex;
      justify-content: center;
      align-items: center;
      font-size: 2.8rem;
      font-weight: 700;
      box-shadow: 0 8px 20px rgba(255, 100, 130, 0.3);
      border: 3px solid white;
      transition: 0.3s;
    }

    .avatar.mia {
      background: linear-gradient(145deg, #ffb6c1, #ff8a9b);
      color: #5f2e3f;
    }

    .avatar.frengky {
      background: linear-gradient(145deg, #a8d8ea, #7fc1d9);
      color: #1e4a5f;
    }

    .heart-icon-big {
      font-size: 2.4rem;
      color: #e8436e;
      filter: drop-shadow(0 0 8px #ff4d7a);
      animation: pulseHeart 1.8s infinite;
    }

    @keyframes pulseHeart {
      0% { transform: scale(1); }
      50% { transform: scale(1.25); }
      100% { transform: scale(1); }
    }

    .title {
      font-weight: 700;
      font-size: 2.1rem;
      letter-spacing: -0.5px;
      color: #4a2c3a;
      margin: 0.2rem 0 0.3rem;
      background: linear-gradient(135deg, #b3415e, #d65f7a);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      text-shadow: 0 0 30px rgba(214, 95, 122, 0.2);
    }

    .subtitle {
      font-weight: 400;
      font-size: 1rem;
      color: #7a5a6a;
      background: rgba(255, 220, 230, 0.5);
      display: inline-block;
      padding: 0.3rem 1.8rem;
      border-radius: 40px;
      backdrop-filter: blur(4px);
      margin-bottom: 1.5rem;
      border: 1px solid rgba(255, 200, 210, 0.5);
    }

    .story {
      background: rgba(255, 245, 248, 0.6);
      padding: 1.2rem 1rem;
      border-radius: 32px;
      margin-bottom: 1.8rem;
      border: 1px solid rgba(255, 180, 190, 0.4);
      box-shadow: inset 0 0 20px rgba(255, 150, 170, 0.1);
    }

    .story p {
      font-weight: 500;
      color: #3d2a33;
      line-height: 1.6;
      font-size: 1rem;
      margin-bottom: 0.3rem;
    }

    .story i {
      color: #e8436e;
      margin: 0 6px;
    }

    .btn-grid {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 1rem 0.8rem;
      margin: 1.8rem 0 1.5rem;
    }

    .btn-love {
      background: white;
      border: none;
      padding: 0.9rem 1.6rem;
      border-radius: 60px;
      font-weight: 600;
      font-size: 1rem;
      color: #4a2c3a;
      box-shadow: 0 6px 18px rgba(200, 80, 120, 0.2);
      display: inline-flex;
      align-items: center;
      gap: 10px;
      transition: 0.2s ease;
      cursor: pointer;
      border: 1px solid rgba(255, 200, 210, 0.5);
      flex: 1 1 auto;
      justify-content: center;
      backdrop-filter: blur(4px);
      background: rgba(255, 255, 255, 0.7);
    }

    .btn-love i {
      font-size: 1.2rem;
      color: #e8436e;
    }

    .btn-love:hover {
      transform: scale(1.03) translateY(-3px);
      background: rgba(255, 255, 255, 0.95);
      box-shadow: 0 12px 28px rgba(200, 70, 110, 0.35);
      border-color: #ff8da1;
    }

    .btn-love:active {
      transform: scale(0.96);
    }

    .btn-special {
      background: linear-gradient(145deg, #ff7b9c, #e8436e);
      color: white !important;
      border: none;
      box-shadow: 0 8px 24px rgba(232, 67, 110, 0.5);
      padding: 1rem 2rem;
      font-size: 1.1rem;
      flex: 1 1 100%;
    }

    .btn-special i {
      color: #ffe3eb !important;
    }

    .btn-special:hover {
      background: linear-gradient(145deg, #ff8aaa, #d63a60);
      box-shadow: 0 12px 32px rgba(232, 67, 110, 0.7);
      transform: scale(1.02) translateY(-4px);
    }

    .romantic-output {
      margin-top: 1.8rem;
      padding: 1rem 0.5rem;
      min-height: 80px;
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      align-items: center;
      gap: 1rem;
    }

    .love-message {
      background: rgba(255, 240, 245, 0.7);
      backdrop-filter: blur(8px);
      padding: 1rem 1.6rem;
      border-radius: 60px;
      font-weight: 600;
      color: #5b2c40;
      box-shadow: 0 4px 20px rgba(200, 80, 120, 0.15);
      border: 1px solid rgba(255, 180, 190, 0.6);
      animation: fadePop 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      font-size: 1rem;
      display: inline-flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: center;
    }

    .love-message i {
      color: #e8436e;
      font-size: 1.3rem;
    }

    @keyframes fadePop {
      0% { opacity: 0; transform: scale(0.6); }
      100% { opacity: 1; transform: scale(1); }
    }

    .burst-heart {
      position: fixed;
      pointer-events: none;
      font-size: 2.8rem;
      z-index: 999;
      animation: burstOut 1s ease-out forwards;
    }

    @keyframes burstOut {
      0% { opacity: 1; transform: translate(0,0) scale(0.5) rotate(0deg); }
      100% { opacity: 0; transform: translate(var(--tx), var(--ty)) scale(2) rotate(360deg); }
    }

    .floating-emoji {
      position: fixed;
      pointer-events: none;
      font-size: 2rem;
      z-index: 999;
      animation: floatEmoji 1.6s ease-out forwards;
    }

    @keyframes floatEmoji {
      0% { opacity: 1; transform: translateY(0) scale(0.8); }
      100% { opacity: 0; transform: translateY(-160px) scale(1.8) rotate(20deg); }
    }

    .music-control {
      margin-top: 1rem;
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 0.8rem;
      background: rgba(255, 240, 245, 0.5);
      padding: 0.5rem 1.2rem;
      border-radius: 60px;
      backdrop-filter: blur(4px);
      border: 1px solid rgba(255, 180, 190, 0.3);
    }

    .music-btn {
      background: none;
      border: none;
      font-size: 1.6rem;
      cursor: pointer;
      color: #b3415e;
      transition: 0.2s;
      padding: 0.2rem 0.6rem;
      border-radius: 40px;
    }

    .music-btn:hover {
      background: rgba(255, 200, 210, 0.3);
      transform: scale(1.1);
    }

    .music-label {
      font-size: 0.8rem;
      color: #7a5a6a;
      font-weight: 600;
      letter-spacing: 0.3px;
    }

    .prayer-section {
      margin-top: 1.8rem;
      font-size: 0.9rem;
      color: #5f3a4a;
      background: rgba(255, 230, 240, 0.4);
      padding: 0.8rem 0.5rem;
      border-radius: 40px;
      border: 1px dashed #e8a0b4;
      backdrop-filter: blur(4px);
    }

    .prayer-section i {
      color: #b3415e;
      margin: 0 4px;
    }

    .prayer-section span {
      font-weight: 700;
      color: #b3415e;
    }

    @media (max-width: 480px) {
      .card { padding: 1.8rem 1rem; }
      .title { font-size: 1.7rem; }
      .avatar { width: 70px; height: 70px; font-size: 2.2rem; }
      .btn-love { font-size: 0.9rem; padding: 0.7rem 1.2rem; }
      .music-control { padding: 0.4rem 0.8rem; }
    }
  </style>
</head>
<body>

  <!-- YouTube Audio Player (Tersembunyi) -->
  <div class="youtube-audio">
    <iframe 
      id="youtubePlayer"
      src="https://www.youtube.com/embed/7kE_Q3oFYFk?autoplay=1&loop=1&playlist=7kE_Q3oFYFk&controls=0&showinfo=0&rel=0&iv_load_policy=3&disablekb=1&mute=0"
      title="YouTube audio player - Adista Saranghae"
      frameborder="0"
      allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
      referrerpolicy="strict-origin-when-cross-origin"
      allowfullscreen>
    </iframe>
  </div>

  <div class="floating-hearts" id="floatingHearts"></div>

  <div class="card" id="mainCard">
    <div class="avatar-section">
      <div class="avatar mia">M</div>
      <span class="heart-icon-big"><i class="fas fa-heart"></i></span>
      <div class="avatar frengky">F</div>
    </div>

    <h1 class="title">Mia ❤️ Frengky</h1>
    <div class="subtitle"><i class="fas fa-map-pin" style="color:#e8436e;"></i> LDR • Tak Terpisahkan <i class="fas fa-map-pin" style="color:#e8436e;"></i></div>

    <div class="story">
      <p><i class="fas fa-quote-left"></i> 6.000 km, 2 zona waktu, satu cinta. <i class="fas fa-quote-right"></i></p>
      <p style="font-weight:300; font-size:0.9rem; margin-top:6px; color:#5f3f4a;">
        <i class="fas fa-infinity"></i> Mia Silitinga & Frengky Sihombing, bertahan dalam doa dan rindu. <i class="fas fa-infinity"></i>
      </p>
    </div>

    <div class="btn-grid">
      <button class="btn-love" data-msg="💕 Kamu adalah rumah yang selalu aku tuju, Mia."><i class="fas fa-home"></i> Rindu</button>
      <button class="btn-love" data-msg="🌹 Setiap detik tanpamu, hati berbisik namamu, Frengky."><i class="fas fa-clock"></i> Detik</button>
      <button class="btn-love" data-msg="🌟 Bintang di langit pun iri, karena cahayamu lebih terang, Mia."><i class="fas fa-star"></i> Bintang</button>
      <button class="btn-love" data-msg="☕ Secangkir kopi, sejuta kenangan bersamamu, Frengky."><i class="fas fa-mug-hot"></i> Kenangan</button>
      <button class="btn-love" data-msg="📱 Layar HP jadi jendela rindu, tapi hatiku selalu di sisimu."><i class="fas fa-phone-alt"></i> LDR</button>
      <button class="btn-love" data-msg="🌈 Setelah badai LDR, pelangi cinta kita akan abadi."><i class="fas fa-rainbow"></i> Pelangi</button>
    </div>

    <button class="btn-love btn-special" id="specialDoaBtn">
      <i class="fas fa-hands-praying"></i>  Doa & Langgeng Selamanya  <i class="fas fa-heart"></i>
    </button>

    <div class="romantic-output" id="romanticOutput">
      <div class="love-message" style="background:rgba(255,220,230,0.5);">
        <i class="fas fa-heart" style="color:#e8436e;"></i>  Klik tombol cinta untuk melihat pesan  <i class="fas fa-heart" style="color:#e8436e;"></i>
      </div>
    </div>

    <!-- MUSIC PLAYER CONTROL -->
    <div class="music-control">
      <button class="music-btn" id="playPauseBtn" title="Putar/Jeda musik">
        <i class="fas fa-pause" id="playIcon"></i>
      </button>
      <span class="music-label"><i class="fas fa-music"></i>  Adista - Saranghae</span>
      <button class="music-btn" id="volumeToggleBtn" title="Mute/Unmute">
        <i class="fas fa-volume-up" id="volumeIcon"></i>
      </button>
    </div>

    <div class="prayer-section">
      <i class="fas fa-dove"></i>  Dalam doa selalu ada <span>Mia & Frengky</span>  <i class="fas fa-dove"></i><br>
      <span style="font-size:0.8rem; opacity:0.8;"><i class="fas fa-infinity"></i> Sampai seterusnya, di dalam doa selalu ada i ahti <i class="fas fa-infinity"></i></span>
    </div>
  </div>

  <script>
    (function() {
      // Floating hearts
      const heartsContainer = document.getElementById('floatingHearts');
      const heartSymbols = ['❤️', '💕', '💖', '✨', '🌸', '💗'];
      for (let i = 0; i < 18; i++) {
        const el = document.createElement('div');
        el.className = 'heart-float';
        el.textContent = heartSymbols[Math.floor(Math.random() * heartSymbols.length)];
        el.style.left = Math.random() * 100 + '%';
        el.style.fontSize = (1.2 + Math.random() * 2.2) + 'rem';
        el.style.animationDuration = (10 + Math.random() * 18) + 's';
        el.style.animationDelay = (Math.random() * 15) + 's';
        heartsContainer.appendChild(el);
      }

      // === YOUTUBE IFRAME CONTROLLER ===
      const iframe = document.getElementById('youtubePlayer');
      let isPlaying = true;
      let isMuted = false;

      // Fungsi untuk memutar: reload iframe dengan autoplay
      function playAudio() {
        const src = iframe.src;
        if (!src.includes('autoplay=1')) {
          iframe.src = src.replace('autoplay=0', 'autoplay=1');
          if (!iframe.src.includes('autoplay')) {
            iframe.src = iframe.src + '&autoplay=1';
          }
        }
        isPlaying = true;
        document.getElementById('playIcon').className = 'fas fa-pause';
      }

      // Fungsi pause: reload iframe tanpa autoplay
      function pauseAudio() {
        let src = iframe.src;
        src = src.replace('autoplay=1', 'autoplay=0');
        if (!src.includes('autoplay=0')) {
          src = src + '&autoplay=0';
        }
        iframe.src = src;
        isPlaying = false;
        document.getElementById('playIcon').className = 'fas fa-play';
      }

      // Fungsi toggle mute: kita reload iframe dengan mute/unmute
      function toggleMute() {
        let src = iframe.src;
        if (isMuted) {
          // Unmute
          src = src.replace('&mute=1', '');
          src = src.replace('?mute=1', '?');
          iframe.src = src;
          isMuted = false;
          document.getElementById('volumeIcon').className = 'fas fa-volume-up';
        } else {
          // Mute
          if (src.includes('?')) {
            if (!src.includes('mute=1')) {
              src = src + '&mute=1';
            }
          } else {
            src = src + '?mute=1';
          }
          iframe.src = src;
          isMuted = true;
          document.getElementById('volumeIcon').className = 'fas fa-volume-mute';
        }
      }

      // === EVENT LISTENER ===
      document.getElementById('playPauseBtn').addEventListener('click', function(e) {
        e.stopPropagation();
        if (isPlaying) {
          pauseAudio();
        } else {
          playAudio();
        }
      });

      document.getElementById('volumeToggleBtn').addEventListener('click', function(e) {
        e.stopPropagation();
        toggleMute();
      });

      // === FUNGSI ROMANTIS ===
      const output = document.getElementById('romanticOutput');

      function showRomanticMessage(msg, emoji = '💖') {
        output.innerHTML = '';
        const div = document.createElement('div');
        div.className = 'love-message';
        div.innerHTML = `<i class="fas fa-heart" style="color:#e8436e;"></i> ${msg} <i class="fas fa-heart" style="color:#e8436e;"></i>`;
        output.appendChild(div);

        for (let i = 0; i < 3; i++) {
          setTimeout(() => {
            const em = document.createElement('div');
            em.className = 'floating-emoji';
            em.textContent = ['❤️', '✨', '💕', '🌟', '🥰', '💞'][Math.floor(Math.random() * 6)];
            em.style.left = (30 + Math.random() * 40) + '%';
            em.style.top = (20 + Math.random() * 30) + '%';
            em.style.fontSize = (1.6 + Math.random() * 2) + 'rem';
            document.body.appendChild(em);
            setTimeout(() => em.remove(), 1800);
          }, i * 120);
        }

        for (let i = 0; i < 6; i++) {
          setTimeout(() => {
            const burst = document.createElement('div');
            burst.className = 'burst-heart';
            burst.textContent = ['❤️', '💗', '💖', '💘', '💝'][Math.floor(Math.random() * 5)];
            burst.style.left = (10 + Math.random() * 80) + '%';
            burst.style.top = (10 + Math.random() * 80) + '%';
            burst.style.setProperty('--tx', (Math.random() * 200 - 100) + 'px');
            burst.style.setProperty('--ty', (Math.random() * -200 - 50) + 'px');
            burst.style.fontSize = (1.8 + Math.random() * 2.5) + 'rem';
            document.body.appendChild(burst);
            setTimeout(() => burst.remove(), 1200);
          }, i * 80);
        }
      }

      // Tombol cinta biasa
      document.querySelectorAll('.btn-love:not(.btn-special)').forEach(btn => {
        btn.addEventListener('click', function(e) {
          const msg = this.getAttribute('data-msg') || 'Cinta abadi untuk Mia & Frengky ❤️';
          showRomanticMessage(msg, '💞');
          const rect = this.getBoundingClientRect();
          for (let i = 0; i < 4; i++) {
            setTimeout(() => {
              const em = document.createElement('div');
              em.className = 'floating-emoji';
              em.textContent = ['🌸', '💋', '🌹', '💌', '🥰'][Math.floor(Math.random() * 5)];
              em.style.left = (rect.left + rect.width/2 + (Math.random()-0.5)*80) + 'px';
              em.style.top = (rect.top + (Math.random()-0.5)*40) + 'px';
              em.style.fontSize = (1.8 + Math.random() * 1.8) + 'rem';
              document.body.appendChild(em);
              setTimeout(() => em.remove(), 1700);
            }, i * 60);
          }
          if (!isPlaying) playAudio();
        });
      });

      // Tombol SPESIAL
      document.getElementById('specialDoaBtn').addEventListener('click', function() {
        const longMessage = `🌹 Semoga Mia & Frengky langgeng sampai seterusnya, di dalam doa selalu ada i ahti 💖✨  •  Cinta sejati tak kenal jarak, hanya kenal rindu dan kesetiaan. •  Dalam setiap doa, nama kalian bersatu. 🙏`;
        showRomanticMessage(longMessage, '🙏✨');
        for (let i = 0; i < 12; i++) {
          setTimeout(() => {
            const burst = document.createElement('div');
            burst.className = 'burst-heart';
            burst.textContent = ['💖', '❤️', '💕', '💗', '💘', '💝', '✨', '🌹'][Math.floor(Math.random() * 8)];
            burst.style.left = (5 + Math.random() * 90) + '%';
            burst.style.top = (5 + Math.random() * 90) + '%';
            burst.style.setProperty('--tx', (Math.random() * 300 - 150) + 'px');
            burst.style.setProperty('--ty', (Math.random() * -300 - 80) + 'px');
            burst.style.fontSize = (2.2 + Math.random() * 3) + 'rem';
            document.body.appendChild(burst);
            setTimeout(() => burst.remove(), 1500);
          }, i * 100);
        }

        setTimeout(() => {
          const em = document.createElement('div');
          em.className = 'floating-emoji';
          em.textContent = '💞 i ahti 💞';
          em.style.left = '45%';
          em.style.top = '40%';
          em.style.fontSize = '3rem';
          em.style.fontWeight = 'bold';
          em.style.color = '#e8436e';
          em.style.textShadow = '0 0 30px #ff8da1';
          document.body.appendChild(em);
          setTimeout(() => em.remove(), 2500);
        }, 400);

        if (!isPlaying) playAudio();
      });

      // Default message
      setTimeout(() => {
        showRomanticMessage('💕 Klik tombol cinta, rasakan hangatnya rindu LDR 💕', '💖');
      }, 400);

      console.log('💖 Musik Adista - Saranghae diputar untuk Mia & Frengky 💖');
    })();
  </script>
</body>
</html>
