<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>💖 Galeri Cinta Mia & Frengky 💖</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@300;400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Quicksand', sans-serif;
      background: linear-gradient(145deg, #fce4ec 0%, #f8e8ff 100%);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 1.5rem;
      margin: 0;
      position: relative;
      overflow-x: hidden;
    }

    /* Floating hearts background */
    .floating-hearts {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 0;
      overflow: hidden;
    }
    .heart-float {
      position: absolute;
      color: rgba(255, 80, 120, 0.12);
      font-size: 2rem;
      animation: floatUp 15s infinite linear;
      transform: translateY(100vh);
    }
    @keyframes floatUp {
      0% { transform: translateY(100vh) rotate(0deg); opacity: 0.2; }
      10% { opacity: 0.6; }
      90% { opacity: 0.6; }
      100% { transform: translateY(-10vh) rotate(720deg); opacity: 0; }
    }

    /* Main Card */
    .card {
      position: relative;
      z-index: 10;
      max-width: 700px;
      width: 100%;
      background: rgba(255, 255, 255, 0.5);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border-radius: 48px;
      padding: 2rem 1.8rem 2.2rem;
      box-shadow: 0 30px 60px rgba(200, 80, 120, 0.2), 0 10px 30px rgba(200, 80, 120, 0.1);
      border: 1px solid rgba(255, 255, 255, 0.6);
      text-align: center;
    }

    /* Title */
    .title {
      font-weight: 700;
      font-size: 1.8rem;
      letter-spacing: -0.5px;
      margin-bottom: 0.3rem;
      background: linear-gradient(135deg, #b3415e, #d65f7a);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .subtitle {
      font-weight: 400;
      font-size: 0.95rem;
      color: #7a5a6a;
      background: rgba(255, 220, 230, 0.5);
      display: inline-block;
      padding: 0.2rem 1.8rem;
      border-radius: 40px;
      backdrop-filter: blur(4px);
      margin-bottom: 1.5rem;
      border: 1px solid rgba(255, 200, 210, 0.4);
    }

    /* ========== SLIDESHOW - FULL IMAGE ========== */
    .slideshow-container {
      position: relative;
      width: 100%;
      border-radius: 32px;
      overflow: hidden;
      box-shadow: 0 15px 40px rgba(200, 80, 120, 0.25);
      aspect-ratio: 4 / 3;
      background: #f8e8ee;
    }

    .slide {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      opacity: 0;
      transition: opacity 1.2s ease-in-out, transform 1.2s ease-in-out;
      transform: scale(1.05);
      display: flex;
      align-items: center;
      justify-content: center;
      background: #f0e0e8;
    }

    .slide.active {
      opacity: 1;
      transform: scale(1);
    }

    /* ★ PERBAIKAN: GAMBAR FULL TANPA TERPOTONG ★ */
    .slide img {
      width: 100%;
      height: 100%;
      object-fit: contain;  /* ← ini kunci agar gambar full tanpa terpotong */
      object-position: center;
      border-radius: 32px;
      display: block;
      background: #f8e8ee;
      padding: 4px; /* sedikit jarak agar lebih rapi */
    }

    /* Caption overlay */
    .slide-caption {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      padding: 1.8rem 1.5rem 1.2rem;
      background: linear-gradient(to top, rgba(0,0,0,0.5) 0%, transparent 100%);
      color: white;
      text-align: left;
      font-weight: 600;
      font-size: 1.1rem;
      letter-spacing: 0.5px;
      opacity: 0;
      transition: opacity 0.6s ease;
      pointer-events: none;
      border-radius: 0 0 32px 32px;
    }
    .slide.active .slide-caption {
      opacity: 1;
    }
    .slide-caption i {
      color: #ff6b8a;
      margin-right: 8px;
    }
    .slide-caption small {
      display: block;
      font-weight: 300;
      font-size: 0.75rem;
      opacity: 0.8;
      margin-top: 4px;
    }

    /* Navigation Dots */
    .dots-container {
      display: flex;
      justify-content: center;
      gap: 10px;
      margin: 1.2rem 0 0.8rem;
    }
    .dot {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: rgba(200, 80, 120, 0.3);
      border: none;
      cursor: pointer;
      transition: all 0.4s ease;
      padding: 0;
    }
    .dot.active {
      background: #e8436e;
      transform: scale(1.3);
      box-shadow: 0 0 16px rgba(232, 67, 110, 0.5);
    }
    .dot:hover {
      transform: scale(1.2);
      background: rgba(232, 67, 110, 0.6);
    }

    /* Navigation Arrows */
    .nav-btn {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      background: rgba(255, 255, 255, 0.25);
      backdrop-filter: blur(6px);
      border: 1px solid rgba(255, 255, 255, 0.3);
      color: white;
      width: 40px;
      height: 40px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      font-size: 1.2rem;
      transition: all 0.3s ease;
      z-index: 20;
      opacity: 0;
      pointer-events: none;
    }
    .slideshow-container:hover .nav-btn,
    .slideshow-container:active .nav-btn {
      opacity: 0.8;
      pointer-events: auto;
    }
    .nav-btn:hover {
      background: rgba(255, 255, 255, 0.5);
      transform: translateY(-50%) scale(1.1);
    }
    .nav-btn.prev { left: 12px; }
    .nav-btn.next { right: 12px; }

    /* ========== MUSIC PLAYER ========== */
    .music-control {
      margin-top: 1.2rem;
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 0.8rem;
      background: rgba(255, 240, 245, 0.5);
      padding: 0.4rem 1.2rem;
      border-radius: 60px;
      backdrop-filter: blur(4px);
      border: 1px solid rgba(255, 180, 190, 0.3);
    }
    .music-btn {
      background: none;
      border: none;
      font-size: 1.4rem;
      cursor: pointer;
      color: #b3415e;
      transition: 0.2s;
      padding: 0.2rem 0.6rem;
      border-radius: 40px;
    }
    .music-btn:hover { background: rgba(255, 200, 210, 0.3); transform: scale(1.1); }
    .music-label {
      font-size: 0.75rem;
      color: #7a5a6a;
      font-weight: 600;
      letter-spacing: 0.3px;
    }

    /* ========== LOVE BUTTONS ========== */
    .love-actions {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 0.6rem;
      margin-top: 1rem;
    }
    .btn-love {
      background: rgba(255, 255, 255, 0.7);
      border: none;
      padding: 0.6rem 1.2rem;
      border-radius: 60px;
      font-weight: 600;
      font-size: 0.85rem;
      color: #4a2c3a;
      box-shadow: 0 4px 12px rgba(200, 80, 120, 0.15);
      display: inline-flex;
      align-items: center;
      gap: 8px;
      transition: 0.2s ease;
      cursor: pointer;
      border: 1px solid rgba(255, 200, 210, 0.4);
      backdrop-filter: blur(4px);
    }
    .btn-love i { font-size: 1rem; color: #e8436e; }
    .btn-love:hover {
      transform: scale(1.04) translateY(-2px);
      background: rgba(255, 255, 255, 0.95);
      box-shadow: 0 8px 20px rgba(200, 70, 110, 0.25);
      border-color: #ff8da1;
    }
    .btn-love:active { transform: scale(0.95); }

    /* ========== ROMANTIC OUTPUT ========== */
    .romantic-output {
      margin-top: 1.2rem;
      min-height: 50px;
      display: flex;
      justify-content: center;
      align-items: center;
    }
    .love-message {
      background: rgba(255, 240, 245, 0.6);
      backdrop-filter: blur(8px);
      padding: 0.7rem 1.4rem;
      border-radius: 60px;
      font-weight: 600;
      color: #5b2c40;
      font-size: 0.9rem;
      border: 1px solid rgba(255, 180, 190, 0.4);
      animation: fadePop 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      display: inline-flex;
      align-items: center;
      gap: 8px;
    }
    .love-message i { color: #e8436e; }
    @keyframes fadePop {
      0% { opacity: 0; transform: scale(0.8); }
      100% { opacity: 1; transform: scale(1); }
    }

    /* ========== BURST HEART ANIMATION ========== */
    .burst-heart {
      position: fixed;
      pointer-events: none;
      font-size: 2.5rem;
      z-index: 999;
      animation: burstOut 1s ease-out forwards;
    }
    @keyframes burstOut {
      0% { opacity: 1; transform: translate(0,0) scale(0.5) rotate(0deg); }
      100% { opacity: 0; transform: translate(var(--tx), var(--ty)) scale(2) rotate(360deg); }
    }
    .floating-emoji {
      position: fixed;
      pointer-events: none;
      font-size: 1.8rem;
      z-index: 999;
      animation: floatEmoji 1.6s ease-out forwards;
    }
    @keyframes floatEmoji {
      0% { opacity: 1; transform: translateY(0) scale(0.8); }
      100% { opacity: 0; transform: translateY(-150px) scale(1.6) rotate(20deg); }
    }

    /* ========== RESPONSIVE ========== */
    @media (max-width: 480px) {
      .card { padding: 1.2rem 1rem; border-radius: 32px; }
      .title { font-size: 1.4rem; }
      .slideshow-container { aspect-ratio: 4 / 3; }
      .nav-btn { width: 32px; height: 32px; font-size: 0.9rem; }
      .nav-btn.prev { left: 6px; }
      .nav-btn.next { right: 6px; }
      .slide-caption { font-size: 0.85rem; padding: 1rem 1rem 0.8rem; }
      .btn-love { font-size: 0.75rem; padding: 0.4rem 0.9rem; }
    }

    /* Tambahan untuk memastikan gambar benar-benar full di semua ukuran */
    @media (max-width: 400px) {
      .slideshow-container { aspect-ratio: 3 / 4; }
    }
    @media (min-width: 800px) {
      .slideshow-container { aspect-ratio: 16 / 10; }
    }
  </style>
</head>
<body>

  <!-- Floating Hearts -->
  <div class="floating-hearts" id="floatingHearts"></div>

  <!-- Main Card -->
  <div class="card">

    <h1 class="title">📸 Kenangan Cinta</h1>
    <div class="subtitle"><i class="fas fa-heart" style="color:#e8436e;"></i> Mia & Frengky <i class="fas fa-heart" style="color:#e8436e;"></i></div>

    <!-- ===== SLIDESHOW ===== -->
    <div class="slideshow-container" id="slideshowContainer">

      <!-- Slide 1 -->
      <div class="slide active" data-index="0">
        <img src="foto1.jpg" alt="Foto Kenangan 1" loading="lazy">
        <div class="slide-caption">
          <i class="fas fa-heart"></i> Saat pertama kali bertemu
          <small>Momen yang tak terlupakan</small>
        </div>
      </div>

      <!-- Slide 2 -->
      <div class="slide" data-index="1">
        <img src="foto2.jpg" alt="Foto Kenangan 2" loading="lazy">
        <div class="slide-caption">
          <i class="fas fa-heart"></i> Tawa dan bahagia bersama
          <small>Setiap detik berharga</small>
        </div>
      </div>

      <!-- Slide 3 -->
      <div class="slide" data-index="2">
        <img src="foto3.jpg" alt="Foto Kenangan 3" loading="lazy">
        <div class="slide-caption">
          <i class="fas fa-heart"></i> Cinta yang tumbuh setiap hari
          <small>Jarak tak pernah jadi penghalang</small>
        </div>
      </div>

      <!-- Slide 4 -->
      <div class="slide" data-index="3">
        <img src="foto4.jpg" alt="Foto Kenangan 4" loading="lazy">
        <div class="slide-caption">
          <i class="fas fa-heart"></i> Sampai jumpa di pelukan
          <small>LDR takkan memisahkan kita</small>
        </div>
      </div>

      <!-- Navigation Buttons -->
      <button class="nav-btn prev" id="prevSlide" aria-label="Previous">
        <i class="fas fa-chevron-left"></i>
      </button>
      <button class="nav-btn next" id="nextSlide" aria-label="Next">
        <i class="fas fa-chevron-right"></i>
      </button>
    </div>

    <!-- Dots -->
    <div class="dots-container" id="dotsContainer">
      <button class="dot active" data-index="0" aria-label="Slide 1"></button>
      <button class="dot" data-index="1" aria-label="Slide 2"></button>
      <button class="dot" data-index="2" aria-label="Slide 3"></button>
      <button class="dot" data-index="3" aria-label="Slide 4"></button>
    </div>

    <!-- ===== MUSIC PLAYER ===== -->
    <div class="music-control">
      <button class="music-btn" id="playPauseBtn">
        <i class="fas fa-play" id="playIcon"></i>
      </button>
      <span class="music-label"><i class="fas fa-music"></i>  Souqy</span>
      <button class="music-btn" id="volumeToggleBtn">
        <i class="fas fa-volume-up" id="volumeIcon"></i>
      </button>
    </div>

    <!-- ===== LOVE BUTTONS ===== -->
    <div class="love-actions">
      <button class="btn-love" data-msg="💕 Kenangan manis bersama kamu, Mia."><i class="fas fa-heart"></i> Kenangan</button>
      <button class="btn-love" data-msg="🌹 Setiap foto adalah cerita cinta kita, Frengky."><i class="fas fa-rose"></i> Cinta</button>
      <button class="btn-love" data-msg="🌟 Kamu adalah bintang dalam setiap fotoku."><i class="fas fa-star"></i> Bintang</button>
      <button class="btn-love special-doa" data-msg="🙏 Semoga Mia & Frengky langgeng sampai seterusnya. i ahti 💖"><i class="fas fa-hands-praying"></i> Doa</button>
    </div>

    <!-- ===== ROMANTIC OUTPUT ===== -->
    <div class="romantic-output" id="romanticOutput">
      <div class="love-message">
        <i class="fas fa-heart" style="color:#e8436e;"></i>  Klik tombol cinta untuk pesan romantis  <i class="fas fa-heart" style="color:#e8436e;"></i>
      </div>
    </div>

  </div>

  <!-- ===== AUDIO (Souqy.mp3) ===== -->
  <audio id="romanticSong" loop preload="auto">
    <source src="https://raw.githubusercontent.com/frengkysihombing/Romantis/dcc093336370164fe887fee660895562a85185fb/Souqy.mp3" type="audio/mpeg">
  </audio>

  <script>
    (function() {

      // ========== FLOATING HEARTS ==========
      const heartsContainer = document.getElementById('floatingHearts');
      const symbols = ['❤️', '💕', '💖', '✨', '🌸', '💗', '🌹'];
      for (let i = 0; i < 25; i++) {
        const el = document.createElement('div');
        el.className = 'heart-float';
        el.textContent = symbols[Math.floor(Math.random() * symbols.length)];
        el.style.left = Math.random() * 100 + '%';
        el.style.fontSize = (1.2 + Math.random() * 2.5) + 'rem';
        el.style.animationDuration = (12 + Math.random() * 20) + 's';
        el.style.animationDelay = (Math.random() * 18) + 's';
        heartsContainer.appendChild(el);
      }

      // ========== SLIDESHOW ==========
      const slides = document.querySelectorAll('.slide');
      const dots = document.querySelectorAll('.dot');
      const prevBtn = document.getElementById('prevSlide');
      const nextBtn = document.getElementById('nextSlide');
      let currentIndex = 0;
      let slideInterval;

      function goToSlide(index) {
        if (index < 0) index = slides.length - 1;
        if (index >= slides.length) index = 0;

        slides.forEach((slide, i) => {
          slide.classList.toggle('active', i === index);
        });

        dots.forEach((dot, i) => {
          dot.classList.toggle('active', i === index);
        });

        currentIndex = index;
      }

      function nextSlide() { goToSlide(currentIndex + 1); }
      function prevSlide() { goToSlide(currentIndex - 1); }

      prevBtn.addEventListener('click', function(e) {
        e.stopPropagation();
        prevSlide();
        resetInterval();
      });

      nextBtn.addEventListener('click', function(e) {
        e.stopPropagation();
        nextSlide();
        resetInterval();
      });

      dots.forEach(dot => {
        dot.addEventListener('click', function() {
          const index = parseInt(this.getAttribute('data-index'));
          goToSlide(index);
          resetInterval();
        });
      });

      function startInterval() {
        slideInterval = setInterval(nextSlide, 4000);
      }
      function resetInterval() {
        clearInterval(slideInterval);
        startInterval();
      }

      const container = document.getElementById('slideshowContainer');
      container.addEventListener('mouseenter', () => clearInterval(slideInterval));
      container.addEventListener('mouseleave', startInterval);
      container.addEventListener('touchstart', () => clearInterval(slideInterval));
      container.addEventListener('touchend', startInterval);

      startInterval();

      // ========== AUDIO PLAYER ==========
      const audio = document.getElementById('romanticSong');
      const playBtn = document.getElementById('playPauseBtn');
      const playIcon = document.getElementById('playIcon');
      const volumeBtn = document.getElementById('volumeToggleBtn');
      const volumeIcon = document.getElementById('volumeIcon');
      let isPlaying = false;
      let isMuted = false;

      function playAudio(showMsg = true) {
        audio.play().then(() => {
          isPlaying = true;
          playIcon.className = 'fas fa-pause';
          if (showMsg) showMessage('🎵 Sedang memutar lagu Souqy 💖');
        }).catch(() => {
          playIcon.className = 'fas fa-play';
          isPlaying = false;
        });
      }

      setTimeout(() => playAudio(false), 500);

      document.addEventListener('click', function first() {
        if (!isPlaying) playAudio(true);
        document.removeEventListener('click', first);
        document.removeEventListener('touchstart', first);
      }, { once: true });
      document.addEventListener('touchstart', function firstTouch() {
        if (!isPlaying) playAudio(true);
        document.removeEventListener('click', firstTouch);
        document.removeEventListener('touchstart', firstTouch);
      }, { once: true });

      playBtn.addEventListener('click', function(e) {
        e.stopPropagation();
        if (isPlaying) {
          audio.pause();
          playIcon.className = 'fas fa-play';
          isPlaying = false;
        } else {
          playAudio(true);
        }
      });

      volumeBtn.addEventListener('click', function(e) {
        e.stopPropagation();
        if (isMuted) {
          audio.muted = false;
          volumeIcon.className = 'fas fa-volume-up';
          isMuted = false;
        } else {
          audio.muted = true;
          volumeIcon.className = 'fas fa-volume-mute';
          isMuted = true;
        }
      });
      audio.volume = 0.6;

      // ========== ROMANTIC MESSAGES ==========
      const output = document.getElementById('romanticOutput');

      function showMessage(msg) {
        output.innerHTML = '';
        const div = document.createElement('div');
        div.className = 'love-message';
        div.innerHTML = `<i class="fas fa-heart" style="color:#e8436e;"></i> ${msg} <i class="fas fa-heart" style="color:#e8436e;"></i>`;
        output.appendChild(div);

        for (let i = 0; i < 5; i++) {
          setTimeout(() => {
            const burst = document.createElement('div');
            burst.className = 'burst-heart';
            burst.textContent = ['❤️', '💗', '💖', '💘', '💝', '✨', '🌹'][Math.floor(Math.random() * 7)];
            burst.style.left = (10 + Math.random() * 80) + '%';
            burst.style.top = (10 + Math.random() * 80) + '%';
            burst.style.setProperty('--tx', (Math.random() * 300 - 150) + 'px');
            burst.style.setProperty('--ty', (Math.random() * -300 - 80) + 'px');
            burst.style.fontSize = (2 + Math.random() * 3) + 'rem';
            document.body.appendChild(burst);
            setTimeout(() => burst.remove(), 1200);
          }, i * 100);
        }
      }

      document.querySelectorAll('.btn-love').forEach(btn => {
        btn.addEventListener('click', function() {
          const msg = this.getAttribute('data-msg') || '💖 Cinta abadi untuk Mia & Frengky 💖';
          showMessage(msg);
          if (!isPlaying) playAudio(true);
        });
      });

      setTimeout(() => {
        showMessage('💕 Klik tombol cinta untuk pesan romantis 💕');
      }, 600);

    })();
  </script>
</body>
</html>
