<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>💖 Mia & Frengky • Cinta Abadi 💖</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@300;400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Quicksand', sans-serif;
      background: linear-gradient(145deg, #fce4ec 0%, #f8e8ff 100%);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 1.5rem;
      margin: 0;
      position: relative;
      overflow-x: hidden;
    }

    .rain-container {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 0;
      overflow: hidden;
    }
    .rain-heart {
      position: absolute;
      font-size: 1.8rem;
      color: rgba(232, 67, 110, 0.2);
      animation: rainFall linear infinite;
      pointer-events: none;
      user-select: none;
    }
    @keyframes rainFall {
      0% { transform: translateY(-10vh) rotate(0deg) scale(0.8); opacity: 0.2; }
      10% { opacity: 0.7; }
      90% { opacity: 0.7; }
      100% { transform: translateY(110vh) rotate(720deg) scale(1.3); opacity: 0; }
    }

    .floating-hearts {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 0;
      overflow: hidden;
    }
    .heart-float {
      position: absolute;
      color: rgba(255, 80, 120, 0.07);
      font-size: 2.5rem;
      animation: floatUp 18s infinite linear;
      transform: translateY(100vh);
    }
    @keyframes floatUp {
      0% { transform: translateY(100vh) rotate(0deg); opacity: 0.1; }
      10% { opacity: 0.4; }
      90% { opacity: 0.4; }
      100% { transform: translateY(-10vh) rotate(720deg); opacity: 0; }
    }

    .card {
      position: relative;
      z-index: 10;
      max-width: 700px;
      width: 100%;
      background: rgba(255, 255, 255, 0.35);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      border-radius: 48px;
      padding: 2rem 1.8rem 2.2rem;
      box-shadow: 0 30px 60px rgba(200, 80, 120, 0.2), 0 10px 30px rgba(200, 80, 120, 0.1);
      border: 1px solid rgba(255, 255, 255, 0.5);
      text-align: center;
    }

    .title {
      font-weight: 700;
      font-size: 2rem;
      letter-spacing: -0.5px;
      margin-bottom: 0.2rem;
      background: linear-gradient(135deg, #b3415e, #d65f7a, #ff6b8a);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      animation: glowTitle 2s ease-in-out infinite alternate;
    }
    @keyframes glowTitle {
      0% { filter: drop-shadow(0 0 10px rgba(232,67,110,0.2)); }
      100% { filter: drop-shadow(0 0 30px rgba(232,67,110,0.5)); }
    }
    .subtitle {
      font-weight: 400;
      font-size: 0.95rem;
      color: #7a5a6a;
      background: rgba(255, 220, 230, 0.5);
      display: inline-block;
      padding: 0.2rem 1.8rem;
      border-radius: 40px;
      backdrop-filter: blur(4px);
      margin-bottom: 1.5rem;
      border: 1px solid rgba(255, 200, 210, 0.4);
      animation: pulseSub 2s infinite;
    }
    @keyframes pulseSub {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.03); }
    }

    .slideshow-container {
      position: relative;
      width: 100%;
      border-radius: 32px;
      overflow: visible;
      box-shadow: 0 15px 40px rgba(200, 80, 120, 0.3);
      aspect-ratio: 4 / 3;
      background: #f0e0e8;
    }

    .slide {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      opacity: 0;
      transition: opacity 1s ease-in-out, transform 1s ease-in-out;
      transform: scale(1.05);
      display: flex;
      align-items: center;
      justify-content: center;
      background: #f0e0e8;
      pointer-events: none;
      border-radius: 32px;
      overflow: hidden;
    }
    .slide.active {
      opacity: 1;
      transform: scale(1);
      pointer-events: auto;
    }
    .slide img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      object-position: center;
      border-radius: 32px;
      display: block;
      background: #f0e0e8;
      padding: 4px;
      pointer-events: none;
    }

    /* ★ TOMBOL NAIK TIPIS agar tidak terpotong ★ */
    .slide-actions {
      position: absolute;
      bottom: 8px; /* ★ Dinaikkan dari -10px menjadi 8px */
      left: 0;
      right: 0;
      display: flex;
      justify-content: center;
      gap: 20px;
      z-index: 999;
      flex-wrap: wrap;
      padding: 0 16px;
      opacity: 0;
      transform: translateY(20px);
      transition: all 0.6s cubic-bezier(0.34, 1.56, 0.64, 1) 0.3s;
      pointer-events: none;
    }
    .slide.active .slide-actions {
      opacity: 1;
      transform: translateY(0);
      pointer-events: auto;
    }

    /* ★ TOMBOL BESAR DENGAN EFEK MENONJOL ★ */
    .love-btn-overlay {
      background: rgba(255, 255, 255, 0.3);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 2px solid rgba(255, 255, 255, 0.6);
      color: white;
      padding: 16px 32px;
      border-radius: 60px;
      font-weight: 800;
      font-size: 1.1rem;
      cursor: pointer;
      transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
      display: inline-flex;
      align-items: center;
      gap: 12px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.25), 0 0 30px rgba(232,67,110,0.2);
      text-shadow: 0 2px 8px rgba(0,0,0,0.3);
      position: relative;
      z-index: 1000;
      pointer-events: auto !important;
      letter-spacing: 0.5px;
      animation: glowPulse 2.5s ease-in-out infinite;
    }
    .love-btn-overlay i {
      font-size: 1.4rem;
      color: #ff6b8a;
    }
    .love-btn-overlay:hover {
      transform: scale(1.15) translateY(-6px);
      background: rgba(255, 255, 255, 0.5);
      box-shadow: 0 16px 50px rgba(232, 67, 110, 0.5), 0 0 60px rgba(232,67,110,0.3);
      border-color: rgba(255,255,255,0.8);
    }
    .love-btn-overlay:active {
      transform: scale(0.92);
    }

    @keyframes glowPulse {
      0%, 100% { box-shadow: 0 10px 40px rgba(0,0,0,0.25), 0 0 20px rgba(232,67,110,0.15); }
      50% { box-shadow: 0 10px 50px rgba(232,67,110,0.4), 0 0 40px rgba(232,67,110,0.25); }
    }

    .love-btn-overlay.special {
      background: linear-gradient(135deg, rgba(232,67,110,0.8), rgba(255,107,138,0.8));
      border-color: rgba(255,255,255,0.6);
      animation: glowPulseSpecial 2s ease-in-out infinite;
    }
    .love-btn-overlay.special:hover {
      background: linear-gradient(135deg, rgba(232,67,110,0.95), rgba(255,107,138,0.95));
      box-shadow: 0 16px 50px rgba(232, 67, 110, 0.6), 0 0 60px rgba(232,67,110,0.4);
    }

    @keyframes glowPulseSpecial {
      0%, 100% { box-shadow: 0 10px 40px rgba(232,67,110,0.3), 0 0 30px rgba(232,67,110,0.15); }
      50% { box-shadow: 0 10px 60px rgba(232,67,110,0.5), 0 0 50px rgba(232,67,110,0.3); }
    }

    /* Caption */
    .slide-caption {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      padding: 1.5rem 1.5rem 1rem;
      background: linear-gradient(to bottom, rgba(0,0,0,0.4) 0%, transparent 100%);
      color: white;
      text-align: left;
      font-weight: 600;
      font-size: 1rem;
      opacity: 0;
      transition: opacity 0.6s ease;
      pointer-events: none;
      border-radius: 32px 32px 0 0;
      z-index: 10;
    }
    .slide.active .slide-caption {
      opacity: 1;
    }
    .slide-caption i { color: #ff6b8a; margin-right: 8px; }
    .slide-caption small {
      display: block;
      font-weight: 300;
      font-size: 0.7rem;
      opacity: 0.7;
      margin-top: 2px;
    }

    /* Navigation */
    .nav-btn {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      background: rgba(255, 255, 255, 0.2);
      backdrop-filter: blur(6px);
      border: 1px solid rgba(255, 255, 255, 0.3);
      color: white;
      width: 40px;
      height: 40px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      font-size: 1.2rem;
      transition: all 0.3s ease;
      z-index: 20;
      opacity: 0;
      pointer-events: none;
    }
    .slideshow-container:hover .nav-btn,
    .slideshow-container:active .nav-btn {
      opacity: 0.8;
      pointer-events: auto;
    }
    .nav-btn:hover {
      background: rgba(255, 255, 255, 0.4);
      transform: translateY(-50%) scale(1.1);
    }
    .nav-btn.prev { left: 12px; }
    .nav-btn.next { right: 12px; }

    /* Dots */
    .dots-container {
      display: flex;
      justify-content: center;
      gap: 10px;
      margin: 1.8rem 0 0.8rem;
    }
    .dot {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: rgba(200, 80, 120, 0.3);
      border: none;
      cursor: pointer;
      transition: all 0.4s ease;
      padding: 0;
    }
    .dot.active {
      background: #e8436e;
      transform: scale(1.3);
      box-shadow: 0 0 20px rgba(232, 67, 110, 0.6);
    }

    /* ===== MUSIC ===== */
    .music-control {
      margin-top: 1.2rem;
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 0.8rem;
      background: rgba(255, 240, 245, 0.5);
      padding: 0.4rem 1.2rem;
      border-radius: 60px;
      backdrop-filter: blur(4px);
      border: 1px solid rgba(255, 180, 190, 0.3);
    }
    .music-btn {
      background: none;
      border: none;
      font-size: 1.4rem;
      cursor: pointer;
      color: #b3415e;
      transition: 0.2s;
      padding: 0.2rem 0.6rem;
      border-radius: 40px;
    }
    .music-btn:hover { background: rgba(255, 200, 210, 0.3); transform: scale(1.1); }
    .music-label {
      font-size: 0.75rem;
      color: #7a5a6a;
      font-weight: 600;
      letter-spacing: 0.3px;
    }

    /* ===== ROMANTIC OUTPUT ===== */
    .romantic-output {
      margin-top: 1.2rem;
      min-height: 55px;
      display: flex;
      justify-content: center;
      align-items: center;
    }
    .love-message {
      background: rgba(255, 240, 245, 0.6);
      backdrop-filter: blur(8px);
      padding: 0.7rem 1.6rem;
      border-radius: 60px;
      font-weight: 600;
      color: #5b2c40;
      font-size: 0.95rem;
      border: 1px solid rgba(255, 180, 190, 0.4);
      animation: fadePop 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      display: inline-flex;
      align-items: center;
      gap: 10px;
      max-width: 100%;
      word-wrap: break-word;
    }
    .love-message i { color: #e8436e; }
    @keyframes fadePop {
      0% { opacity: 0; transform: scale(0.8); }
      100% { opacity: 1; transform: scale(1); }
    }

    /* ===== HUJAN LOVE SAAT KLIK ===== */
    .rain-burst {
      position: fixed;
      pointer-events: none;
      font-size: 2.5rem;
      z-index: 999;
      animation: burstLove 1.8s ease-out forwards;
    }
    @keyframes burstLove {
      0% { opacity: 1; transform: translate(0,0) scale(0.3) rotate(0deg); }
      50% { opacity: 1; transform: translate(var(--tx), var(--ty)) scale(1.2) rotate(180deg); }
      100% { opacity: 0; transform: translate(calc(var(--tx)*1.5), calc(var(--ty)*1.5)) scale(2.5) rotate(360deg); }
    }

    .floating-emoji {
      position: fixed;
      pointer-events: none;
      font-size: 2.2rem;
      z-index: 999;
      animation: floatEmoji 2.2s ease-out forwards;
    }
    @keyframes floatEmoji {
      0% { opacity: 1; transform: translateY(0) scale(0.6); }
      100% { opacity: 0; transform: translateY(-250px) scale(2) rotate(40deg); }
    }

    /* ===== RESPONSIVE ===== */
    @media (max-width: 480px) {
      .card { padding: 1.2rem 1rem; border-radius: 32px; }
      .title { font-size: 1.5rem; }
      .slideshow-container { aspect-ratio: 4 / 3; }
      .nav-btn { width: 32px; height: 32px; font-size: 0.9rem; }
      
      .love-btn-overlay {
        font-size: 0.85rem;
        padding: 12px 20px;
        gap: 8px;
      }
      .love-btn-overlay i { font-size: 1rem; }
      .slide-actions { 
        bottom: 4px; /* ★ Dinaikkan di HP */
        gap: 10px;
      }
      .slide-caption { font-size: 0.8rem; padding: 1rem 1rem 0.5rem; }
    }

    @media (max-width: 380px) {
      .love-btn-overlay {
        font-size: 0.7rem;
        padding: 10px 14px;
        gap: 6px;
      }
      .love-btn-overlay i { font-size: 0.8rem; }
      .slide-actions { bottom: 2px; gap: 6px; }
    }
  </style>
</head>
<body>

  <div class="rain-container" id="rainContainer"></div>
  <div class="floating-hearts" id="floatingHearts"></div>

  <div class="card">

    <h1 class="title">💖 Mia & Frengky 💖</h1>
    <div class="subtitle"><i class="fas fa-heart" style="color:#e8436e;"></i> LDR • Cinta Sejati <i class="fas fa-heart" style="color:#e8436e;"></i></div>

    <div class="slideshow-container" id="slideshowContainer">

      <!-- Slide 1 -->
      <div class="slide active" data-index="0">
        <img src="foto1.jpg" alt="Kenangan 1" loading="lazy">
        <div class="slide-caption">
          <i class="fas fa-heart"></i> Pertama kali bertemu
          <small>Momen yang tak terlupakan</small>
        </div>
        <div class="slide-actions">
          <button class="love-btn-overlay" data-msg="💕 Kenangan manis pertama kali kita bertemu, Mia. Aku takkan pernah melupakannya."><i class="fas fa-heart"></i> Kenangan</button>
          <button class="love-btn-overlay special" data-msg="🌹 Senyummu di hari itu membuat hatiku bergetar, Frengky. Aku langsung jatuh cinta."><i class="fas fa-rose"></i> Cinta</button>
        </div>
      </div>

      <!-- Slide 2 -->
      <div class="slide" data-index="1">
        <img src="foto2.jpg" alt="Kenangan 2" loading="lazy">
        <div class="slide-caption">
          <i class="fas fa-heart"></i> Tawa dan bahagia
          <small>Setiap detik berharga</small>
        </div>
        <div class="slide-actions">
          <button class="love-btn-overlay" data-msg="💕 Tawa bahagia kita bersama adalah obat rinduku setiap hari, Mia."><i class="fas fa-heart"></i> Bahagia</button>
          <button class="love-btn-overlay special" data-msg="🌟 Kamu adalah bintang yang menerangi setiap hariku, Frengky. Tanpamu gelap."><i class="fas fa-star"></i> Bintang</button>
        </div>
      </div>

      <!-- Slide 3 -->
      <div class="slide" data-index="2">
        <img src="foto3.jpg" alt="Kenangan 3" loading="lazy">
        <div class="slide-caption">
          <i class="fas fa-heart"></i> Cinta yang tumbuh
          <small>Jarak tak jadi penghalang</small>
        </div>
        <div class="slide-actions">
          <button class="love-btn-overlay" data-msg="💕 Setiap hari aku merindukanmu lebih dalam, Mia. Jarak tak mengurangi cintaku."><i class="fas fa-heart"></i> Rindu</button>
          <button class="love-btn-overlay special" data-msg="🌈 Cinta kita sekuat pelangi, melewati badai LDR dengan indah, Frengky."><i class="fas fa-rainbow"></i> Pelangi</button>
        </div>
      </div>

      <!-- Slide 4 -->
      <div class="slide" data-index="3">
        <img src="foto4.jpg" alt="Kenangan 4" loading="lazy">
        <div class="slide-caption">
          <i class="fas fa-heart"></i> Sampai jumpa di pelukan
          <small>LDR takkan memisahkan kita</small>
        </div>
        <div class="slide-actions">
          <button class="love-btn-overlay" data-msg="💕 Aku menunggumu dengan sepenuh hati, Mia. Sampai kita bertemu lagi."><i class="fas fa-heart"></i> Tunggu</button>
          <button class="love-btn-overlay special" data-msg="🙏 Semoga cinta kita langgeng sampai i ahti, Frengky. Dalam doa selalu ada kamu."><i class="fas fa-hands-praying"></i> Doa</button>
        </div>
      </div>

      <button class="nav-btn prev" id="prevSlide"><i class="fas fa-chevron-left"></i></button>
      <button class="nav-btn next" id="nextSlide"><i class="fas fa-chevron-right"></i></button>
    </div>

    <div class="dots-container" id="dotsContainer">
      <button class="dot active" data-index="0"></button>
      <button class="dot" data-index="1"></button>
      <button class="dot" data-index="2"></button>
      <button class="dot" data-index="3"></button>
    </div>

    <div class="music-control">
      <button class="music-btn" id="playPauseBtn">
        <i class="fas fa-play" id="playIcon"></i>
      </button>
      <span class="music-label"><i class="fas fa-music"></i> Souqy</span>
      <button class="music-btn" id="volumeToggleBtn">
        <i class="fas fa-volume-up" id="volumeIcon"></i>
      </button>
    </div>

    <div class="romantic-output" id="romanticOutput">
      <div class="love-message">
        <i class="fas fa-heart" style="color:#e8436e;"></i>  Klik tombol cinta di dalam foto  <i class="fas fa-heart" style="color:#e8436e;"></i>
      </div>
    </div>

  </div>

  <audio id="romanticSong" loop preload="auto">
    <source src="https://raw.githubusercontent.com/frengkysihombing/Romantis/dcc093336370164fe887fee660895562a85185fb/Souqy.mp3" type="audio/mpeg">
  </audio>

  <script>
    (function() {

      // ========== HUJAN LOVE BACKGROUND ==========
      const rainContainer = document.getElementById('rainContainer');
      const loveSymbols = ['❤️', '💕', '💖', '💗', '💘', '💝', '🌹', '🌸', '✨', '💞'];
      for (let i = 0; i < 40; i++) {
        const el = document.createElement('div');
        el.className = 'rain-heart';
        el.textContent = loveSymbols[Math.floor(Math.random() * loveSymbols.length)];
        el.style.left = Math.random() * 100 + '%';
        el.style.fontSize = (1 + Math.random() * 2.5) + 'rem';
        el.style.animationDuration = (8 + Math.random() * 15) + 's';
        el.style.animationDelay = (Math.random() * 12) + 's';
        el.style.opacity = 0.15 + Math.random() * 0.3;
        rainContainer.appendChild(el);
      }

      // ========== FLOATING HEARTS ==========
      const heartsContainer = document.getElementById('floatingHearts');
      const symbols = ['❤️', '💕', '💖', '✨', '🌸', '💗', '🌹'];
      for (let i = 0; i < 25; i++) {
        const el = document.createElement('div');
        el.className = 'heart-float';
        el.textContent = symbols[Math.floor(Math.random() * symbols.length)];
        el.style.left = Math.random() * 100 + '%';
        el.style.fontSize = (1.5 + Math.random() * 3) + 'rem';
        el.style.animationDuration = (14 + Math.random() * 22) + 's';
        el.style.animationDelay = (Math.random() * 20) + 's';
        heartsContainer.appendChild(el);
      }

      // ========== SLIDESHOW ==========
      const slides = document.querySelectorAll('.slide');
      const dots = document.querySelectorAll('.dot');
      const prevBtn = document.getElementById('prevSlide');
      const nextBtn = document.getElementById('nextSlide');
      let currentIndex = 0;
      let slideInterval;

      function goToSlide(index) {
        if (index < 0) index = slides.length - 1;
        if (index >= slides.length) index = 0;
        slides.forEach((s, i) => s.classList.toggle('active', i === index));
        dots.forEach((d, i) => d.classList.toggle('active', i === index));
        currentIndex = index;
      }

      function nextSlide() { goToSlide(currentIndex + 1); }
      function prevSlide() { goToSlide(currentIndex - 1); }

      prevBtn.addEventListener('click', (e) => { e.stopPropagation(); prevSlide(); resetInterval(); });
      nextBtn.addEventListener('click', (e) => { e.stopPropagation(); nextSlide(); resetInterval(); });
      dots.forEach(dot => {
        dot.addEventListener('click', function() {
          goToSlide(parseInt(this.getAttribute('data-index')));
          resetInterval();
        });
      });

      function startInterval() { slideInterval = setInterval(nextSlide, 4000); }
      function resetInterval() { clearInterval(slideInterval); startInterval(); }

      const container = document.getElementById('slideshowContainer');
      container.addEventListener('mouseenter', () => clearInterval(slideInterval));
      container.addEventListener('mouseleave', startInterval);
      container.addEventListener('touchstart', () => clearInterval(slideInterval));
      container.addEventListener('touchend', startInterval);
      startInterval();

      // ========== AUDIO ==========
      const audio = document.getElementById('romanticSong');
      const playBtn = document.getElementById('playPauseBtn');
      const playIcon = document.getElementById('playIcon');
      const volumeBtn = document.getElementById('volumeToggleBtn');
      const volumeIcon = document.getElementById('volumeIcon');
      let isPlaying = false, isMuted = false;

      function playAudio(showMsg = true) {
        audio.play().then(() => {
          isPlaying = true;
          playIcon.className = 'fas fa-pause';
          if (showMsg) showLoveBurst('🎵 Sedang memutar lagu Souqy 💖');
        }).catch(() => {
          playIcon.className = 'fas fa-play';
          isPlaying = false;
        });
      }

      setTimeout(() => playAudio(false), 500);
      document.addEventListener('click', function first() {
        if (!isPlaying) playAudio(true);
        document.removeEventListener('click', first);
        document.removeEventListener('touchstart', first);
      }, { once: true });
      document.addEventListener('touchstart', function firstTouch() {
        if (!isPlaying) playAudio(true);
        document.removeEventListener('click', firstTouch);
        document.removeEventListener('touchstart', firstTouch);
      }, { once: true });

      playBtn.addEventListener('click', function(e) {
        e.stopPropagation();
        if (isPlaying) { audio.pause(); playIcon.className = 'fas fa-play'; isPlaying = false; }
        else { playAudio(true); }
      });

      volumeBtn.addEventListener('click', function(e) {
        e.stopPropagation();
        if (isMuted) { audio.muted = false; volumeIcon.className = 'fas fa-volume-up'; isMuted = false; }
        else { audio.muted = true; volumeIcon.className = 'fas fa-volume-mute'; isMuted = true; }
      });
      audio.volume = 0.6;

      // ========== FUNGSI HUJAN LOVE MASSIF ==========
      function showLoveBurst(msg) {
        const output = document.getElementById('romanticOutput');
        output.innerHTML = '';
        const div = document.createElement('div');
        div.className = 'love-message';
        div.innerHTML = `<i class="fas fa-heart" style="color:#e8436e;"></i> ${msg} <i class="fas fa-heart" style="color:#e8436e;"></i>`;
        output.appendChild(div);

        const emojis = ['❤️', '💕', '💖', '💗', '💘', '💝', '🌹', '🌸', '✨', '💞', '💓', '🥰', '😍', '💋'];
        const colors = ['#e8436e', '#ff6b8a', '#ff8da1', '#ffb6c1', '#d65f7a', '#ff4d7a', '#ff2d55'];

        for (let i = 0; i < 50; i++) {
          setTimeout(() => {
            const el = document.createElement('div');
            el.className = 'rain-burst';
            el.textContent = emojis[Math.floor(Math.random() * emojis.length)];
            el.style.left = (5 + Math.random() * 90) + '%';
            el.style.top = (5 + Math.random() * 90) + '%';
            const tx = (Math.random() * 500 - 250);
            const ty = (Math.random() * -500 - 100);
            el.style.setProperty('--tx', tx + 'px');
            el.style.setProperty('--ty', ty + 'px');
            el.style.fontSize = (1.5 + Math.random() * 3.5) + 'rem';
            el.style.color = colors[Math.floor(Math.random() * colors.length)];
            el.style.textShadow = '0 0 20px rgba(232,67,110,0.3)';
            document.body.appendChild(el);
            setTimeout(() => el.remove(), 1800);
          }, i * 30);
        }

        const floatEmojis = ['💖', '✨', '💕', '🌟', '🥰', '💞', '🌹', '💗', '💘', '😍'];
        for (let i = 0; i < 20; i++) {
          setTimeout(() => {
            const em = document.createElement('div');
            em.className = 'floating-emoji';
            em.textContent = floatEmojis[Math.floor(Math.random() * floatEmojis.length)];
            em.style.left = (5 + Math.random() * 90) + '%';
            em.style.top = (10 + Math.random() * 80) + '%';
            em.style.fontSize = (1.5 + Math.random() * 3) + 'rem';
            em.style.color = colors[Math.floor(Math.random() * colors.length)];
            document.body.appendChild(em);
            setTimeout(() => em.remove(), 2400);
          }, i * 60);
        }

        if (!isPlaying) playAudio(false);
      }

      // ========== EVENT LISTENER UNTUK SEMUA TOMBOL ==========
      document.addEventListener('click', function(e) {
        const btn = e.target.closest('.love-btn-overlay');
        if (btn) {
          e.stopPropagation();
          e.preventDefault();
          const msg = btn.getAttribute('data-msg') || '💖 Cinta abadi untuk Mia & Frengky 💖';
          console.log('Tombol diklik:', msg);
          showLoveBurst(msg);
        }
      });

      // ========== PESAN DEFAULT ==========
      setTimeout(() => {
        showLoveBurst('💕 Klik tombol cinta di dalam foto untuk pesan romantis 💕');
      }, 800);

    })();
  </script>
</body>
</html>
