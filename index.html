<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>💖 Mia & Frengky • Love Story 💖</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Quicksand:wght@300;400;600;700&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Nunito', 'Quicksand', sans-serif;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 1.5rem;
      margin: 0;
      position: relative;
      overflow-x: hidden;
      background: #0a0a0f;
    }

    body::before {
      content: '';
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: 
        radial-gradient(ellipse at 20% 50%, rgba(232,67,110,0.12) 0%, transparent 60%),
        radial-gradient(ellipse at 80% 50%, rgba(255,107,138,0.08) 0%, transparent 60%),
        linear-gradient(135deg, #0a0a0f 0%, #1a0a12 30%, #0d0a1a 60%, #0a0a0f 100%);
      z-index: 0;
    }

    /* ===== BINTANG (DIKURANGI) ===== */
    .stars {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 0;
      overflow: hidden;
    }
    .star {
      position: absolute;
      width: 2px;
      height: 2px;
      background: rgba(255,255,255,0.4);
      border-radius: 50%;
      animation: twinkle var(--duration) ease-in-out infinite alternate;
    }
    @keyframes twinkle {
      0% { opacity: 0.2; }
      100% { opacity: 0.8; }
    }

    /* ===== HUJAN LOVE (DIKURANGI) ===== */
    .rain-container {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 0;
      overflow: hidden;
    }
    .rain-heart {
      position: absolute;
      font-size: 1.4rem;
      color: rgba(232, 67, 110, 0.08);
      animation: rainFall linear infinite;
      pointer-events: none;
      user-select: none;
    }
    @keyframes rainFall {
      0% { transform: translateY(-10vh) rotate(0deg); opacity: 0; }
      10% { opacity: 0.4; }
      90% { opacity: 0.4; }
      100% { transform: translateY(110vh) rotate(360deg); opacity: 0; }
    }

    .card {
      position: relative;
      z-index: 10;
      max-width: 720px;
      width: 100%;
      background: rgba(255, 248, 250, 0.05);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-radius: 48px;
      padding: 2.2rem 1.8rem 2.2rem;
      border: 1px solid rgba(255, 215, 220, 0.06);
      box-shadow: 0 30px 80px rgba(0,0,0,0.4);
      text-align: center;
    }

    .glow-orb {
      position: absolute;
      border-radius: 50%;
      filter: blur(80px);
      pointer-events: none;
      z-index: -1;
    }
    .glow-orb.orb1 { width: 200px; height: 200px; top: -80px; right: -80px; background: rgba(232,67,110,0.1); }
    .glow-orb.orb2 { width: 180px; height: 180px; bottom: -60px; left: -60px; background: rgba(255,107,138,0.08); }

    .ornament-top {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 12px;
      margin-bottom: 0.6rem;
      color: rgba(255,215,220,0.3);
      font-size: 0.8rem;
      font-family: 'Playfair Display', serif;
      font-style: italic;
      letter-spacing: 3px;
    }
    .ornament-top .line { flex: 1; height: 1px; background: linear-gradient(to right, transparent, rgba(255,215,220,0.15), transparent); max-width: 50px; }
    .ornament-top i { color: rgba(232,67,110,0.4); font-size: 0.7rem; }

    .title {
      font-family: 'Playfair Display', serif;
      font-weight: 700;
      font-size: 2.4rem;
      letter-spacing: -0.5px;
      margin-bottom: 0.2rem;
      background: linear-gradient(135deg, #ffb6c9, #ff6b8a, #e8436e);
      background-size: 200% 200%;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      animation: gradientShift 4s ease-in-out infinite;
    }
    @keyframes gradientShift { 0%, 100% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } }

    .subtitle {
      font-family: 'Playfair Display', serif;
      font-style: italic;
      font-weight: 400;
      font-size: 0.85rem;
      color: rgba(255,215,220,0.5);
      background: rgba(255, 255, 255, 0.02);
      display: inline-block;
      padding: 0.2rem 1.8rem;
      border-radius: 40px;
      margin-bottom: 1.2rem;
      border: 1px solid rgba(255,215,220,0.05);
      letter-spacing: 2px;
    }

    /* ===== SLIDESHOW ===== */
    .slideshow-container {
      position: relative;
      width: 100%;
      border-radius: 24px;
      overflow: hidden;
      aspect-ratio: 4 / 3;
      background: rgba(10,10,15,0.2);
      padding: 4px;
    }

    .paper-frame {
      position: relative;
      width: 100%;
      height: 100%;
      border-radius: 20px;
      background: rgba(255,248,250,0.02);
      padding: 8px;
      border: 1px solid rgba(255,215,220,0.04);
      overflow: hidden;
    }

    /* ===== SLIDE (TANPA ROTASI BERAT) ===== */
    .slide {
      position: absolute;
      top: 8px;
      width: calc(100% - 16px);
      height: calc(100% - 16px);
      opacity: 0;
      transition: all 0.7s cubic-bezier(0.4, 0, 0.2, 1);
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(10,10,15,0.2);
      border-radius: 14px;
      pointer-events: none;
      overflow: hidden;
    }

    .slide.slide-left { left: -110%; transform: scale(0.95); }
    .slide.slide-left.active { left: 8px; opacity: 1; transform: scale(1); pointer-events: auto; }

    .slide.slide-right { left: 110%; transform: scale(0.95); }
    .slide.slide-right.active { left: 8px; opacity: 1; transform: scale(1); pointer-events: auto; }

    .slide.slide-left.exit { left: -110%; opacity: 0; transform: scale(0.95); pointer-events: none; }
    .slide.slide-right.exit { left: 110%; opacity: 0; transform: scale(0.95); pointer-events: none; }

    .slide img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      object-position: center;
      border-radius: 12px;
      display: block;
      background: rgba(10,10,15,0.1);
      padding: 2px;
      pointer-events: none;
    }

    /* ===== ★ ANIMASI DI TENGAH FOTO DIHAPUS ★ ===== */
    /* Hanya menyisakan efek ring sederhana */
    .love-ring {
      position: absolute;
      top: 50%;
      left: 50%;
      width: 80px;
      height: 80px;
      transform: translate(-50%, -50%) scale(0);
      border-radius: 50%;
      border: 1.5px solid rgba(232, 67, 110, 0.1);
      pointer-events: none;
      z-index: 2;
      opacity: 0;
      transition: all 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
    }
    .slide.active .love-ring {
      opacity: 1;
      transform: translate(-50%, -50%) scale(1.6);
      animation: ringPulse 3s ease-in-out infinite;
    }
    @keyframes ringPulse {
      0%, 100% { transform: translate(-50%, -50%) scale(1.6); opacity: 0.15; border-width: 1.5px; }
      50% { transform: translate(-50%, -50%) scale(2.2); opacity: 0.4; border-width: 2.5px; border-color: rgba(255, 107, 138, 0.2); }
    }

    /* ===== CAPTION ===== */
    .slide-caption {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      padding: 1rem 1.2rem 0.6rem;
      background: linear-gradient(to bottom, rgba(0,0,0,0.5) 0%, transparent 100%);
      color: #ffffff;
      text-align: left;
      font-weight: 700;
      font-size: 1rem;
      opacity: 0;
      transition: opacity 0.6s ease 0.2s;
      pointer-events: none;
      border-radius: 12px 12px 0 0;
      z-index: 10;
      font-family: 'Nunito', 'Quicksand', sans-serif;
      text-shadow: 0 2px 20px rgba(0,0,0,0.4);
      letter-spacing: 0.3px;
      line-height: 1.4;
    }
    .slide.active .slide-caption { opacity: 1; }
    .slide-caption i { color: #ff6b8a; margin-right: 8px; }
    .slide-caption small {
      display: block;
      font-weight: 400;
      font-size: 0.7rem;
      opacity: 0.7;
      margin-top: 2px;
      font-family: 'Nunito', 'Quicksand', sans-serif;
      letter-spacing: 0.2px;
    }

    /* ===== TOMBOL ===== */
    .slide-actions {
      position: absolute;
      bottom: 14px;
      left: 0;
      right: 0;
      display: flex;
      justify-content: center;
      gap: 12px;
      z-index: 999;
      flex-wrap: wrap;
      padding: 0 12px;
      opacity: 0;
      transform: translateY(15px);
      transition: all 0.6s cubic-bezier(0.34, 1.56, 0.64, 1) 0.3s;
      pointer-events: none;
    }
    .slide.active .slide-actions { opacity: 1; transform: translateY(0); pointer-events: auto; }

    .love-btn-overlay {
      background: rgba(255,255,255,0.06);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid rgba(255,215,220,0.08);
      color: rgba(255,255,255,0.8);
      padding: 8px 18px;
      border-radius: 60px;
      font-weight: 700;
      font-size: 0.75rem;
      cursor: pointer;
      transition: all 0.3s ease;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.1);
      font-family: 'Nunito', 'Quicksand', sans-serif;
      letter-spacing: 0.3px;
      position: relative;
      z-index: 1000;
      pointer-events: auto !important;
    }
    .love-btn-overlay i { font-size: 0.8rem; color: rgba(255,107,138,0.4); }
    .love-btn-overlay:hover {
      transform: scale(1.05) translateY(-2px);
      background: rgba(255,255,255,0.1);
      border-color: rgba(255,215,220,0.15);
    }
    .love-btn-overlay:active { transform: scale(0.95); }
    .love-btn-overlay.special {
      background: linear-gradient(135deg, rgba(232,67,110,0.08), rgba(255,107,138,0.05));
      border-color: rgba(232,67,110,0.1);
    }

    .nav-btn {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      background: rgba(255,255,255,0.03);
      backdrop-filter: blur(6px);
      border: 1px solid rgba(255,215,220,0.04);
      color: rgba(255,255,255,0.2);
      width: 32px;
      height: 32px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      font-size: 0.8rem;
      transition: all 0.3s ease;
      z-index: 20;
      opacity: 0;
      pointer-events: none;
    }
    .slideshow-container:hover .nav-btn, .slideshow-container:active .nav-btn { opacity: 0.5; pointer-events: auto; }
    .nav-btn:hover { background: rgba(255,255,255,0.06); transform: translateY(-50%) scale(1.1); opacity: 1; color: rgba(255,255,255,0.5); }
    .nav-btn.prev { left: 4px; }
    .nav-btn.next { right: 4px; }

    .dots-container {
      display: flex;
      justify-content: center;
      gap: 8px;
      margin: 1.2rem 0 0.5rem;
    }
    .dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: rgba(255,215,220,0.1);
      border: 1px solid rgba(255,215,220,0.03);
      cursor: pointer;
      transition: all 0.3s ease;
      padding: 0;
    }
    .dot.active { background: #e8436e; transform: scale(1.4); box-shadow: 0 0 16px rgba(232,67,110,0.2); border-color: #e8436e; }

    .ornament-bottom {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 12px;
      margin-top: 0.8rem;
      color: rgba(255,215,220,0.15);
      font-size: 0.7rem;
      font-family: 'Playfair Display', serif;
      font-style: italic;
      letter-spacing: 2px;
    }
    .ornament-bottom .line { flex: 1; height: 1px; background: linear-gradient(to right, transparent, rgba(255,215,220,0.08), transparent); max-width: 40px; }
    .ornament-bottom i { color: rgba(232,67,110,0.2); font-size: 0.6rem; }

    .music-control {
      margin-top: 1.2rem;
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 0.6rem;
      background: rgba(255,255,255,0.02);
      padding: 0.2rem 1rem;
      border-radius: 60px;
      backdrop-filter: blur(6px);
      border: 1px solid rgba(255,215,220,0.03);
    }
    .music-btn { background: none; border: none; font-size: 1rem; cursor: pointer; color: rgba(255,215,220,0.3); transition: 0.3s; padding: 0.2rem 0.5rem; border-radius: 40px; }
    .music-btn:hover { background: rgba(255,255,255,0.02); transform: scale(1.1); color: rgba(255,215,220,0.5); }
    .music-label { font-size: 0.6rem; color: rgba(255,215,220,0.2); font-weight: 600; letter-spacing: 1px; font-family: 'Playfair Display', serif; font-style: italic; }

    .romantic-output {
      margin-top: 1rem;
      min-height: 40px;
      display: flex;
      justify-content: center;
      align-items: center;
    }
    .love-message {
      background: rgba(255,255,255,0.02);
      backdrop-filter: blur(6px);
      padding: 0.4rem 1.2rem;
      border-radius: 60px;
      font-weight: 600;
      color: rgba(255,215,220,0.5);
      font-size: 0.8rem;
      border: 1px solid rgba(255,215,220,0.03);
      animation: fadePop 0.4s ease;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-family: 'Nunito', 'Quicksand', sans-serif;
      letter-spacing: 0.3px;
    }
    .love-message i { color: #e8436e; }
    @keyframes fadePop { 0% { opacity: 0; transform: scale(0.9); } 100% { opacity: 1; transform: scale(1); } }

    /* ===== BURST LOVE (TETAP ADA) ===== */
    .rain-burst {
      position: fixed;
      pointer-events: none;
      font-size: 2.2rem;
      z-index: 9999;
      animation: burstLove 1.5s ease-out forwards;
    }
    @keyframes burstLove {
      0% { opacity: 1; transform: translate(0,0) scale(0.3) rotate(0deg); }
      100% { opacity: 0; transform: translate(var(--tx), var(--ty)) scale(2.5) rotate(360deg); }
    }
    .floating-emoji {
      position: fixed;
      pointer-events: none;
      font-size: 1.8rem;
      z-index: 9999;
      animation: floatEmoji 2s ease-out forwards;
    }
    @keyframes floatEmoji {
      0% { opacity: 1; transform: translateY(0) scale(0.6); }
      100% { opacity: 0; transform: translateY(-250px) scale(2) rotate(30deg); }
    }

    @media (max-width: 480px) {
      .card { padding: 1.2rem 0.8rem; border-radius: 32px; }
      .title { font-size: 1.8rem; }
      .slide-caption { font-size: 0.75rem; padding: 0.6rem 0.8rem 0.4rem; }
      .slide-caption small { font-size: 0.6rem; }
      .love-btn-overlay { font-size: 0.65rem; padding: 6px 12px; gap: 4px; }
      .love-btn-overlay i { font-size: 0.7rem; }
      .slide-actions { bottom: 10px; gap: 6px; }
      .nav-btn { width: 28px; height: 28px; font-size: 0.7rem; }
      .love-ring { width: 60px; height: 60px; }
      .slide.active .love-ring { transform: translate(-50%, -50%) scale(1.4); }
    }
    @media (max-width: 380px) {
      .title { font-size: 1.5rem; }
      .slide-caption { font-size: 0.65rem; }
      .love-btn-overlay { font-size: 0.55rem; padding: 4px 10px; }
      .love-btn-overlay i { font-size: 0.6rem; }
    }
  </style>
</head>
<body>

  <div class="stars" id="starsContainer"></div>
  <div class="rain-container" id="rainContainer"></div>

  <div class="card">
    <div class="glow-orb orb1"></div>
    <div class="glow-orb orb2"></div>

    <div class="ornament-top">
      <span class="line"></span>
      <i class="fas fa-heart"></i>
      <i class="fas fa-star" style="font-size:0.5rem;"></i>
      <i class="fas fa-heart"></i>
      <span class="line"></span>
    </div>

    <h1 class="title">Mia ❤️ Frengky</h1>
    <div class="subtitle"><i class="fas fa-feather-alt"></i> LDR • Cinta Sejati <i class="fas fa-feather-alt"></i></div>

    <div class="slideshow-container" id="slideshowContainer">

      <div class="paper-frame">

        <!-- Slide 1 -->
        <div class="slide slide-left active" data-index="0">
          <img src="foto1.jpg" alt="Kenangan 1" loading="lazy">
          <div class="love-ring"></div>
          <div class="slide-caption">
            <i class="fas fa-heart"></i> Pertama kali bertemu
            <small>Momen yang tak terlupakan</small>
          </div>
          <div class="slide-actions">
            <button class="love-btn-overlay" data-msg="💕 Kenangan pertama kali kita bertemu, Aku takkan pernah melupakan semuanya."><i class="fas fa-heart"></i> Kenangan</button>
            <button class="love-btn-overlay special" data-msg="🌹 Senyummu, Candamu adalah semangat ku saat ini."><i class="fas fa-rose"></i> Cinta</button>
          </div>
        </div>

        <!-- Slide 2 -->
        <div class="slide slide-right" data-index="1">
          <img src="foto2.jpg" alt="Kenangan 2" loading="lazy">
          <div class="love-ring"></div>
          <div class="slide-caption">
            <i class="fas fa-heart"></i> Tawa dan bahagia
            <small>Setiap detik berharga</small>
          </div>
          <div class="slide-actions">
            <button class="love-btn-overlay" data-msg="💕 Tawa bahagia kita bersama adalah obat rinduku setiap hari."><i class="fas fa-heart"></i> Bahagia</button>
            <button class="love-btn-overlay special" data-msg="🌟 Kamu adalah bintang yang menerangi setiap hariku, Tanpamu semuanya gelap."><i class="fas fa-star"></i> Bintang</button>
          </div>
        </div>

        <!-- Slide 3 -->
        <div class="slide slide-left" data-index="2">
          <img src="foto3.jpg" alt="Kenangan 3" loading="lazy">
          <div class="love-ring"></div>
          <div class="slide-caption">
            <i class="fas fa-heart"></i> Cinta yang tumbuh
            <small>Jarak tak jadi penghalang</small>
          </div>
          <div class="slide-actions">
            <button class="love-btn-overlay" data-msg="💕 Setiap hari aku merindukanmu lebih dalam, Jarak tak mengurangi cintaku."><i class="fas fa-heart"></i> Rindu</button>
            <button class="love-btn-overlay special" data-msg="🌈 Cinta kita sekuat pelangi, melewati badai LDR dengan indah."><i class="fas fa-rainbow"></i> Pelangi</button>
          </div>
        </div>

        <!-- Slide 4 -->
        <div class="slide slide-right" data-index="3">
          <img src="foto4.jpg" alt="Kenangan 4" loading="lazy">
          <div class="love-ring"></div>
          <div class="slide-caption">
            <i class="fas fa-heart"></i> Sampai jumpa di pelukan
            <small>LDR takkan memisahkan kita</small>
          </div>
          <div class="slide-actions">
            <button class="love-btn-overlay" data-msg="💕 Aku menunggumu dengan sepenuh hati,  Sampai kita bertemu lagi."><i class="fas fa-heart"></i> Tunggu</button>
            <button class="love-btn-overlay special" data-msg="🙏 Semoga cinta kita langgeng sampai kita bisa bertemu kembali, Frengky. Dalam doa selalu ada kamu."><i class="fas fa-hands-praying"></i> Doa</button>
          </div>
        </div>

        <button class="nav-btn prev" id="prevSlide"><i class="fas fa-chevron-left"></i></button>
        <button class="nav-btn next" id="nextSlide"><i class="fas fa-chevron-right"></i></button>
      </div>
    </div>

    <div class="dots-container" id="dotsContainer">
      <button class="dot active" data-index="0"></button>
      <button class="dot" data-index="1"></button>
      <button class="dot" data-index="2"></button>
      <button class="dot" data-index="3"></button>
    </div>

    <div class="ornament-bottom">
      <span class="line"></span>
      <i class="fas fa-heart"></i>
      <i class="fas fa-infinity" style="font-size:0.6rem;"></i>
      <i class="fas fa-heart"></i>
      <span class="line"></span>
    </div>

    <div class="music-control">
      <button class="music-btn" id="playPauseBtn">
        <i class="fas fa-play" id="playIcon"></i>
      </button>
      <span class="music-label"><i class="fas fa-music"></i> Souqy</span>
      <button class="music-btn" id="volumeToggleBtn">
        <i class="fas fa-volume-up" id="volumeIcon"></i>
      </button>
    </div>

    <div class="romantic-output" id="romanticOutput">
      <div class="love-message">
        <i class="fas fa-heart" style="color:#e8436e;"></i>  Klik tombol cinta di dalam foto  <i class="fas fa-heart" style="color:#e8436e;"></i>
      </div>
    </div>

  </div>

  <audio id="romanticSong" loop preload="auto">
    <source src="https://raw.githubusercontent.com/frengkysihombing/Romantis/dcc093336370164fe887fee660895562a85185fb/Souqy.mp3" type="audio/mpeg">
  </audio>

  <script>
    (function() {

      // ========== BINTANG (DIKURANGI) ==========
      const starsContainer = document.getElementById('starsContainer');
      for (let i = 0; i < 60; i++) {
        const star = document.createElement('div');
        star.className = 'star';
        star.style.left = Math.random() * 100 + '%';
        star.style.top = Math.random() * 100 + '%';
        star.style.setProperty('--duration', (2 + Math.random() * 4) + 's');
        star.style.animationDelay = (Math.random() * 5) + 's';
        starsContainer.appendChild(star);
      }

      // ========== HUJAN LOVE (DIKURANGI) ==========
      const rainContainer = document.getElementById('rainContainer');
      const loveSymbols = ['❤️', '💕', '💖', '✨', '🌸', '💗'];
      for (let i = 0; i < 20; i++) {
        const el = document.createElement('div');
        el.className = 'rain-heart';
        el.textContent = loveSymbols[Math.floor(Math.random() * loveSymbols.length)];
        el.style.left = Math.random() * 100 + '%';
        el.style.fontSize = (0.8 + Math.random() * 1.5) + 'rem';
        el.style.animationDuration = (10 + Math.random() * 12) + 's';
        el.style.animationDelay = (Math.random() * 10) + 's';
        el.style.opacity = 0.04 + Math.random() * 0.08;
        rainContainer.appendChild(el);
      }

      // ========== SLIDESHOW ==========
      const slides = document.querySelectorAll('.slide');
      const dots = document.querySelectorAll('.dot');
      const prevBtn = document.getElementById('prevSlide');
      const nextBtn = document.getElementById('nextSlide');
      let currentIndex = 0;
      let slideInterval;
      let isTransitioning = false;

      function goToSlide(index) {
        if (isTransitioning) return;
        if (index < 0) index = slides.length - 1;
        if (index >= slides.length) index = 0;
        
        isTransitioning = true;
        const direction = index > currentIndex ? 'right' : 'left';
        
        slides.forEach(s => s.classList.remove('active', 'exit'));
        
        const currentSlide = slides[currentIndex];
        if (currentSlide.classList.contains('slide-left')) currentSlide.classList.add('exit');
        else if (currentSlide.classList.contains('slide-right')) currentSlide.classList.add('exit');
        else {
          currentSlide.style.left = direction === 'right' ? '-110%' : '110%';
          currentSlide.style.opacity = '0';
        }
        
        const nextSlide = slides[index];
        if (direction === 'right') {
          nextSlide.style.left = '110%';
          nextSlide.style.opacity = '0';
          nextSlide.style.transform = 'scale(0.95)';
        } else {
          nextSlide.style.left = '-110%';
          nextSlide.style.opacity = '0';
          nextSlide.style.transform = 'scale(0.95)';
        }
        
        void nextSlide.offsetWidth;
        
        nextSlide.classList.add('active');
        nextSlide.style.left = '8px';
        nextSlide.style.opacity = '1';
        nextSlide.style.transform = 'scale(1)';
        
        dots.forEach((d, i) => d.classList.toggle('active', i === index));
        
        currentIndex = index;
        
        setTimeout(() => {
          isTransitioning = false;
          slides.forEach(s => {
            if (!s.classList.contains('active')) {
              s.style.left = '';
              s.style.opacity = '';
              s.style.transform = '';
            }
          });
        }, 700);
      }

      function nextSlideFn() { if (!isTransitioning) { goToSlide(currentIndex + 1); resetInterval(); } }
      function prevSlideFn() { if (!isTransitioning) { goToSlide(currentIndex - 1); resetInterval(); } }

      prevBtn.addEventListener('click', (e) => { e.stopPropagation(); prevSlideFn(); });
      nextBtn.addEventListener('click', (e) => { e.stopPropagation(); nextSlideFn(); });
      
      dots.forEach(dot => {
        dot.addEventListener('click', function() {
          const index = parseInt(this.getAttribute('data-index'));
          if (index !== currentIndex && !isTransitioning) {
            goToSlide(index);
            resetInterval();
          }
        });
      });

      function startInterval() { slideInterval = setInterval(nextSlideFn, 4500); }
      function resetInterval() { clearInterval(slideInterval); startInterval(); }

      const container = document.getElementById('slideshowContainer');
      container.addEventListener('mouseenter', () => clearInterval(slideInterval));
      container.addEventListener('mouseleave', startInterval);
      container.addEventListener('touchstart', () => clearInterval(slideInterval));
      container.addEventListener('touchend', startInterval);
      startInterval();

      // ========== AUDIO ==========
      const audio = document.getElementById('romanticSong');
      const playBtn = document.getElementById('playPauseBtn');
      const playIcon = document.getElementById('playIcon');
      const volumeBtn = document.getElementById('volumeToggleBtn');
      const volumeIcon = document.getElementById('volumeIcon');
      let isPlaying = false, isMuted = false;

      function playAudio(showMsg = true) {
        audio.play().then(() => {
          isPlaying = true;
          playIcon.className = 'fas fa-pause';
          if (showMsg) showLoveBurst('🎵 Sedang memutar lagu Souqy 💖');
        }).catch(() => {
          playIcon.className = 'fas fa-play';
          isPlaying = false;
        });
      }

      setTimeout(() => playAudio(false), 500);
      document.addEventListener('click', function first() {
        if (!isPlaying) playAudio(true);
        document.removeEventListener('click', first);
        document.removeEventListener('touchstart', first);
      }, { once: true });
      document.addEventListener('touchstart', function firstTouch() {
        if (!isPlaying) playAudio(true);
        document.removeEventListener('click', firstTouch);
        document.removeEventListener('touchstart', firstTouch);
      }, { once: true });

      playBtn.addEventListener('click', function(e) {
        e.stopPropagation();
        if (isPlaying) { audio.pause(); playIcon.className = 'fas fa-play'; isPlaying = false; }
        else { playAudio(true); }
      });

      volumeBtn.addEventListener('click', function(e) {
        e.stopPropagation();
        if (isMuted) { audio.muted = false; volumeIcon.className = 'fas fa-volume-up'; isMuted = false; }
        else { audio.muted = true; volumeIcon.className = 'fas fa-volume-mute'; isMuted = true; }
      });
      audio.volume = 0.5;

      // ========== LOVE BURST ==========
      function showLoveBurst(msg) {
        const output = document.getElementById('romanticOutput');
        output.innerHTML = '';
        const div = document.createElement('div');
        div.className = 'love-message';
        div.innerHTML = `<i class="fas fa-heart" style="color:#e8436e;"></i> ${msg} <i class="fas fa-heart" style="color:#e8436e;"></i>`;
        output.appendChild(div);

        const emojis = ['❤️', '💕', '💖', '💗', '💘', '💝', '🌹', '🌸', '✨', '💞'];
        const colors = ['#e8436e', '#ff6b8a', '#ff8da1', '#ffb6c1', '#d65f7a'];

        // Dikurangi dari 60 menjadi 30
        for (let i = 0; i < 30; i++) {
          setTimeout(() => {
            const el = document.createElement('div');
            el.className = 'rain-burst';
            el.textContent = emojis[Math.floor(Math.random() * emojis.length)];
            el.style.left = (10 + Math.random() * 80) + '%';
            el.style.top = (10 + Math.random() * 80) + '%';
            const tx = (Math.random() * 400 - 200);
            const ty = (Math.random() * -400 - 80);
            el.style.setProperty('--tx', tx + 'px');
            el.style.setProperty('--ty', ty + 'px');
            el.style.fontSize = (1.5 + Math.random() * 3) + 'rem';
            el.style.color = colors[Math.floor(Math.random() * colors.length)];
            document.body.appendChild(el);
            setTimeout(() => el.remove(), 1600);
          }, i * 30);
        }

        // Dikurangi dari 25 menjadi 12
        const floatEmojis = ['💖', '✨', '💕', '🌟', '🥰', '💞'];
        for (let i = 0; i < 12; i++) {
          setTimeout(() => {
            const em = document.createElement('div');
            em.className = 'floating-emoji';
            em.textContent = floatEmojis[Math.floor(Math.random() * floatEmojis.length)];
            em.style.left = (10 + Math.random() * 80) + '%';
            em.style.top = (10 + Math.random() * 80) + '%';
            em.style.fontSize = (1.5 + Math.random() * 2) + 'rem';
            em.style.color = colors[Math.floor(Math.random() * colors.length)];
            document.body.appendChild(em);
            setTimeout(() => em.remove(), 2200);
          }, i * 50);
        }

        if (!isPlaying) playAudio(false);
      }

      // ========== TOMBOL ==========
      document.addEventListener('click', function(e) {
        const btn = e.target.closest('.love-btn-overlay');
        if (btn) {
          e.stopPropagation();
          e.preventDefault();
          const msg = btn.getAttribute('data-msg') || '💖 Cinta abadi untuk Mia & Frengky 💖';
          showLoveBurst(msg);
        }
      });

      // ========== PESAN DEFAULT ==========
      setTimeout(() => {
        showLoveBurst('💕 Klik tombol cinta di dalam foto untuk pesan romantis 💕');
      }, 800);

    })();
  </script>
</body>
</html>
