<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>💖 Mia & Frengky • Love Story 💖</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Quicksand:wght@300;400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Quicksand', sans-serif;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 1.5rem;
      margin: 0;
      position: relative;
      overflow-x: hidden;
      background: #0a0a0f;
    }

    /* ===== BACKGROUND GRADIENT MEWAH ===== */
    body::before {
      content: '';
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: 
        radial-gradient(ellipse at 20% 50%, rgba(232,67,110,0.15) 0%, transparent 60%),
        radial-gradient(ellipse at 80% 50%, rgba(255,107,138,0.1) 0%, transparent 60%),
        radial-gradient(ellipse at 50% 100%, rgba(180,60,100,0.08) 0%, transparent 50%),
        linear-gradient(135deg, #0a0a0f 0%, #1a0a12 30%, #0d0a1a 60%, #0a0a0f 100%);
      z-index: 0;
    }

    /* ===== BINTANG GLITTER ===== */
    .stars {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 0;
      overflow: hidden;
    }
    .star {
      position: absolute;
      width: 3px;
      height: 3px;
      background: white;
      border-radius: 50%;
      animation: twinkle var(--duration) ease-in-out infinite alternate;
    }
    @keyframes twinkle {
      0% { opacity: 0.2; transform: scale(0.8); }
      100% { opacity: 1; transform: scale(1.2); }
    }

    /* ===== HUJAN LOVE ===== */
    .rain-container {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 0;
      overflow: hidden;
    }
    .rain-heart {
      position: absolute;
      font-size: 1.8rem;
      color: rgba(232, 67, 110, 0.12);
      animation: rainFall linear infinite;
      pointer-events: none;
      user-select: none;
    }
    @keyframes rainFall {
      0% { transform: translateY(-10vh) rotate(0deg) scale(0.8); opacity: 0.1; }
      10% { opacity: 0.5; }
      90% { opacity: 0.5; }
      100% { transform: translateY(110vh) rotate(720deg) scale(1.3); opacity: 0; }
    }

    /* ===== CARD UTAMA ===== */
    .card {
      position: relative;
      z-index: 10;
      max-width: 720px;
      width: 100%;
      background: rgba(255, 248, 250, 0.06);
      backdrop-filter: blur(30px);
      -webkit-backdrop-filter: blur(30px);
      border-radius: 56px;
      padding: 2.5rem 2rem 2.5rem;
      border: 1px solid rgba(255, 215, 220, 0.08);
      box-shadow: 
        0 40px 100px rgba(0,0,0,0.5),
        0 0 80px rgba(232,67,110,0.05),
        inset 0 1px 0 rgba(255,255,255,0.05);
      text-align: center;
    }

    /* ===== GLOW ORB ===== */
    .glow-orb {
      position: absolute;
      border-radius: 50%;
      filter: blur(80px);
      pointer-events: none;
      z-index: -1;
    }
    .glow-orb.orb1 {
      width: 300px;
      height: 300px;
      top: -100px;
      right: -100px;
      background: rgba(232,67,110,0.15);
    }
    .glow-orb.orb2 {
      width: 250px;
      height: 250px;
      bottom: -80px;
      left: -80px;
      background: rgba(255,107,138,0.1);
    }

    /* ===== ORNAMEN ATAS ===== */
    .ornament-top {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 14px;
      margin-bottom: 0.8rem;
      color: rgba(255,215,220,0.4);
      font-size: 1rem;
      font-family: 'Playfair Display', serif;
      font-style: italic;
      letter-spacing: 3px;
    }
    .ornament-top .line {
      flex: 1;
      height: 1px;
      background: linear-gradient(to right, transparent, rgba(255,215,220,0.2), transparent);
      max-width: 60px;
    }
    .ornament-top i {
      color: rgba(232,67,110,0.5);
      font-size: 0.8rem;
    }

    /* ===== TITLE ===== */
    .title {
      font-family: 'Playfair Display', serif;
      font-weight: 700;
      font-size: 2.6rem;
      letter-spacing: -0.5px;
      margin-bottom: 0.2rem;
      background: linear-gradient(135deg, #ffb6c9, #ff6b8a, #e8436e, #d65f7a);
      background-size: 300% 300%;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      animation: gradientShift 4s ease-in-out infinite;
      text-shadow: none;
    }
    @keyframes gradientShift {
      0%, 100% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
    }

    .subtitle {
      font-family: 'Playfair Display', serif;
      font-style: italic;
      font-weight: 400;
      font-size: 0.95rem;
      color: rgba(255,215,220,0.6);
      background: rgba(255, 255, 255, 0.03);
      display: inline-block;
      padding: 0.3rem 2rem;
      border-radius: 40px;
      backdrop-filter: blur(4px);
      margin-bottom: 1.5rem;
      border: 1px solid rgba(255,215,220,0.06);
      letter-spacing: 2px;
    }
    .subtitle i {
      color: rgba(232,67,110,0.5);
      margin: 0 6px;
    }

    /* ===== SLIDESHOW ===== */
    .slideshow-container {
      position: relative;
      width: 100%;
      border-radius: 28px;
      overflow: visible;
      aspect-ratio: 4 / 3;
      background: transparent;
      padding: 6px;
    }

    .paper-frame {
      position: relative;
      width: 100%;
      height: 100%;
      border-radius: 24px;
      background: rgba(255,248,250,0.03);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      box-shadow: 
        0 4px 30px rgba(0,0,0,0.3),
        inset 0 0 60px rgba(232,67,110,0.03);
      padding: 10px;
      border: 1px solid rgba(255,215,220,0.06);
      overflow: hidden;
    }

    .paper-frame::before {
      content: '';
      position: absolute;
      top: -50%;
      left: -50%;
      width: 200%;
      height: 200%;
      background: conic-gradient(from 0deg, transparent, rgba(232,67,110,0.03), transparent, rgba(255,107,138,0.03), transparent);
      animation: rotateGlow 20s linear infinite;
      pointer-events: none;
    }
    @keyframes rotateGlow {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    .slide {
      position: absolute;
      top: 10px;
      left: 10px;
      width: calc(100% - 20px);
      height: calc(100% - 20px);
      opacity: 0;
      transition: opacity 1.2s cubic-bezier(0.4, 0, 0.2, 1), transform 1.2s cubic-bezier(0.4, 0, 0.2, 1);
      transform: scale(0.95) rotate(-2deg);
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(10,10,15,0.3);
      border-radius: 18px;
      pointer-events: none;
      overflow: hidden;
      backdrop-filter: blur(5px);
    }
    .slide.active {
      opacity: 1;
      transform: scale(1) rotate(0deg);
      pointer-events: auto;
    }
    .slide img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      object-position: center;
      border-radius: 14px;
      display: block;
      background: rgba(10,10,15,0.2);
      padding: 4px;
      pointer-events: none;
      filter: drop-shadow(0 4px 20px rgba(0,0,0,0.3));
    }

    /* ===== CAPTION ===== */
    .slide-caption {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      padding: 1.2rem 1.5rem 0.8rem;
      background: linear-gradient(to bottom, rgba(0,0,0,0.5) 0%, transparent 100%);
      color: rgba(255,255,255,0.9);
      text-align: left;
      font-weight: 600;
      font-size: 0.95rem;
      opacity: 0;
      transition: opacity 0.8s ease 0.3s;
      pointer-events: none;
      border-radius: 14px 14px 0 0;
      z-index: 10;
      font-family: 'Playfair Display', serif;
      font-style: italic;
      text-shadow: 0 2px 20px rgba(0,0,0,0.3);
    }
    .slide.active .slide-caption {
      opacity: 1;
    }
    .slide-caption i { color: #ff6b8a; margin-right: 8px; }
    .slide-caption small {
      display: block;
      font-weight: 300;
      font-size: 0.7rem;
      opacity: 0.6;
      margin-top: 2px;
      font-style: normal;
      font-family: 'Quicksand', sans-serif;
    }

    /* ===== TOMBOL CINTA ===== */
    .slide-actions {
      position: absolute;
      bottom: 20px;
      left: 0;
      right: 0;
      display: flex;
      justify-content: center;
      gap: 16px;
      z-index: 999;
      flex-wrap: wrap;
      padding: 0 12px;
      opacity: 0;
      transform: translateY(30px);
      transition: all 0.8s cubic-bezier(0.34, 1.56, 0.64, 1) 0.4s;
      pointer-events: none;
    }
    .slide.active .slide-actions {
      opacity: 1;
      transform: translateY(0);
      pointer-events: auto;
    }

    .love-btn-overlay {
      background: rgba(255,255,255,0.06);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(255,215,220,0.1);
      color: rgba(255,255,255,0.9);
      padding: 14px 28px;
      border-radius: 60px;
      font-weight: 600;
      font-size: 0.95rem;
      cursor: pointer;
      transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
      display: inline-flex;
      align-items: center;
      gap: 10px;
      box-shadow: 0 4px 30px rgba(0,0,0,0.2);
      text-shadow: 0 1px 10px rgba(0,0,0,0.3);
      position: relative;
      z-index: 1000;
      pointer-events: auto !important;
      letter-spacing: 0.5px;
      font-family: 'Playfair Display', serif;
    }
    .love-btn-overlay i {
      font-size: 1rem;
      color: #ff6b8a;
    }
    .love-btn-overlay:hover {
      transform: scale(1.08) translateY(-4px);
      background: rgba(255,255,255,0.12);
      border-color: rgba(255,215,220,0.2);
      box-shadow: 0 8px 40px rgba(232,67,110,0.2), 0 0 60px rgba(232,67,110,0.05);
    }
    .love-btn-overlay:active {
      transform: scale(0.94);
    }

    .love-btn-overlay.special {
      background: linear-gradient(135deg, rgba(232,67,110,0.2), rgba(255,107,138,0.15));
      border-color: rgba(232,67,110,0.2);
    }
    .love-btn-overlay.special:hover {
      background: linear-gradient(135deg, rgba(232,67,110,0.3), rgba(255,107,138,0.25));
      border-color: rgba(232,67,110,0.3);
      box-shadow: 0 8px 40px rgba(232,67,110,0.3);
    }

    /* ===== NAVIGASI ===== */
    .nav-btn {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      background: rgba(255,255,255,0.04);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border: 1px solid rgba(255,215,220,0.06);
      color: rgba(255,255,255,0.5);
      width: 40px;
      height: 40px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      font-size: 1rem;
      transition: all 0.4s ease;
      z-index: 20;
      opacity: 0;
      pointer-events: none;
      box-shadow: 0 2px 20px rgba(0,0,0,0.1);
    }
    .slideshow-container:hover .nav-btn,
    .slideshow-container:active .nav-btn {
      opacity: 0.6;
      pointer-events: auto;
    }
    .nav-btn:hover {
      background: rgba(255,255,255,0.08);
      transform: translateY(-50%) scale(1.1);
      opacity: 1;
      color: rgba(255,255,255,0.8);
    }
    .nav-btn.prev { left: 6px; }
    .nav-btn.next { right: 6px; }

    /* ===== DOTS ===== */
    .dots-container {
      display: flex;
      justify-content: center;
      gap: 10px;
      margin: 2rem 0 0.5rem;
    }
    .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: rgba(255,215,220,0.15);
      border: 1px solid rgba(255,215,220,0.05);
      cursor: pointer;
      transition: all 0.4s ease;
      padding: 0;
    }
    .dot.active {
      background: #e8436e;
      transform: scale(1.5);
      box-shadow: 0 0 20px rgba(232,67,110,0.3);
      border-color: #e8436e;
    }

    /* ===== ORNAMEN BAWAH ===== */
    .ornament-bottom {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 14px;
      margin-top: 1rem;
      color: rgba(255,215,220,0.2);
      font-size: 0.8rem;
      font-family: 'Playfair Display', serif;
      font-style: italic;
      letter-spacing: 2px;
    }
    .ornament-bottom .line {
      flex: 1;
      height: 1px;
      background: linear-gradient(to right, transparent, rgba(255,215,220,0.1), transparent);
      max-width: 50px;
    }
    .ornament-bottom i {
      color: rgba(232,67,110,0.3);
      font-size: 0.7rem;
    }

    /* ===== MUSIC ===== */
    .music-control {
      margin-top: 1.5rem;
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 0.8rem;
      background: rgba(255,255,255,0.03);
      padding: 0.3rem 1.2rem;
      border-radius: 60px;
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255,215,220,0.05);
    }
    .music-btn {
      background: none;
      border: none;
      font-size: 1.1rem;
      cursor: pointer;
      color: rgba(255,215,220,0.4);
      transition: 0.3s;
      padding: 0.2rem 0.6rem;
      border-radius: 40px;
    }
    .music-btn:hover { 
      background: rgba(255,255,255,0.03); 
      transform: scale(1.1);
      color: rgba(255,215,220,0.7);
    }
    .music-label {
      font-size: 0.7rem;
      color: rgba(255,215,220,0.3);
      font-weight: 600;
      letter-spacing: 1px;
      font-family: 'Playfair Display', serif;
      font-style: italic;
    }

    /* ===== ROMANTIC OUTPUT ===== */
    .romantic-output {
      margin-top: 1.2rem;
      min-height: 45px;
      display: flex;
      justify-content: center;
      align-items: center;
    }
    .love-message {
      background: rgba(255,255,255,0.03);
      backdrop-filter: blur(10px);
      padding: 0.6rem 1.6rem;
      border-radius: 60px;
      font-weight: 600;
      color: rgba(255,215,220,0.6);
      font-size: 0.85rem;
      border: 1px solid rgba(255,215,220,0.04);
      animation: fadePop 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      display: inline-flex;
      align-items: center;
      gap: 10px;
      font-family: 'Playfair Display', serif;
      font-style: italic;
      letter-spacing: 0.5px;
    }
    .love-message i { color: #e8436e; }
    @keyframes fadePop {
      0% { opacity: 0; transform: scale(0.8); }
      100% { opacity: 1; transform: scale(1); }
    }

    /* ===== HUJAN LOVE SAAT KLIK ===== */
    .rain-burst {
      position: fixed;
      pointer-events: none;
      font-size: 2.8rem;
      z-index: 9999;
      animation: burstLove 1.8s ease-out forwards;
    }
    @keyframes burstLove {
      0% { opacity: 1; transform: translate(0,0) scale(0.3) rotate(0deg); }
      50% { opacity: 1; transform: translate(var(--tx), var(--ty)) scale(1.2) rotate(180deg); }
      100% { opacity: 0; transform: translate(calc(var(--tx)*1.5), calc(var(--ty)*1.5)) scale(2.5) rotate(360deg); }
    }

    .floating-emoji {
      position: fixed;
      pointer-events: none;
      font-size: 2.2rem;
      z-index: 9999;
      animation: floatEmoji 2.5s ease-out forwards;
    }
    @keyframes floatEmoji {
      0% { opacity: 1; transform: translateY(0) scale(0.6); }
      100% { opacity: 0; transform: translateY(-300px) scale(2) rotate(40deg); }
    }

    /* ===== RESPONSIVE ===== */
    @media (max-width: 480px) {
      .card { padding: 1.5rem 1rem; border-radius: 32px; }
      .title { font-size: 1.8rem; }
      .love-btn-overlay { font-size: 0.7rem; padding: 10px 16px; gap: 6px; }
      .love-btn-overlay i { font-size: 0.75rem; }
      .slide-actions { bottom: 12px; gap: 8px; }
      .nav-btn { width: 32px; height: 32px; font-size: 0.8rem; }
      .slide-caption { font-size: 0.75rem; padding: 0.8rem 1rem 0.5rem; }
      .ornament-top, .ornament-bottom { font-size: 0.7rem; }
      .ornament-top .line, .ornament-bottom .line { max-width: 30px; }
    }
    @media (max-width: 380px) {
      .love-btn-overlay { font-size: 0.6rem; padding: 8px 12px; gap: 4px; }
      .love-btn-overlay i { font-size: 0.65rem; }
      .slide-actions { bottom: 8px; gap: 6px; }
    }
  </style>
</head>
<body>

  <!-- ===== BINTANG ===== -->
  <div class="stars" id="starsContainer"></div>

  <!-- ===== HUJAN LOVE ===== -->
  <div class="rain-container" id="rainContainer"></div>

  <!-- ===== CARD UTAMA ===== -->
  <div class="card">
    <div class="glow-orb orb1"></div>
    <div class="glow-orb orb2"></div>

    <!-- Ornamen Atas -->
    <div class="ornament-top">
      <span class="line"></span>
      <i class="fas fa-heart"></i>
      <i class="fas fa-star" style="font-size:0.6rem;"></i>
      <i class="fas fa-heart"></i>
      <span class="line"></span>
    </div>

    <h1 class="title">Mia ❤️ Frengky</h1>
    <div class="subtitle"><i class="fas fa-feather-alt"></i> LDR • Cinta Sejati <i class="fas fa-feather-alt"></i></div>

    <!-- ===== SLIDESHOW ===== -->
    <div class="slideshow-container" id="slideshowContainer">

      <div class="paper-frame">

        <!-- Slide 1 -->
        <div class="slide active" data-index="0">
          <img src="foto1.jpg" alt="Kenangan 1" loading="lazy">
          <div class="slide-caption">
            <i class="fas fa-heart"></i> Pertama kali bertemu
            <small>Momen yang tak terlupakan</small>
          </div>
          <div class="slide-actions">
            <button class="love-btn-overlay" data-msg="💕 Kenangan manis pertama kali kita bertemu, Mia. Aku takkan pernah melupakannya."><i class="fas fa-heart"></i> Kenangan</button>
            <button class="love-btn-overlay special" data-msg="🌹 Senyummu di hari itu membuat hatiku bergetar, Frengky. Aku langsung jatuh cinta."><i class="fas fa-rose"></i> Cinta</button>
          </div>
        </div>

        <!-- Slide 2 -->
        <div class="slide" data-index="1">
          <img src="foto2.jpg" alt="Kenangan 2" loading="lazy">
          <div class="slide-caption">
            <i class="fas fa-heart"></i> Tawa dan bahagia
            <small>Setiap detik berharga</small>
          </div>
          <div class="slide-actions">
            <button class="love-btn-overlay" data-msg="💕 Tawa bahagia kita bersama adalah obat rinduku setiap hari, Mia."><i class="fas fa-heart"></i> Bahagia</button>
            <button class="love-btn-overlay special" data-msg="🌟 Kamu adalah bintang yang menerangi setiap hariku, Frengky. Tanpamu gelap."><i class="fas fa-star"></i> Bintang</button>
          </div>
        </div>

        <!-- Slide 3 -->
        <div class="slide" data-index="2">
          <img src="foto3.jpg" alt="Kenangan 3" loading="lazy">
          <div class="slide-caption">
            <i class="fas fa-heart"></i> Cinta yang tumbuh
            <small>Jarak tak jadi penghalang</small>
          </div>
          <div class="slide-actions">
            <button class="love-btn-overlay" data-msg="💕 Setiap hari aku merindukanmu lebih dalam, Mia. Jarak tak mengurangi cintaku."><i class="fas fa-heart"></i> Rindu</button>
            <button class="love-btn-overlay special" data-msg="🌈 Cinta kita sekuat pelangi, melewati badai LDR dengan indah, Frengky."><i class="fas fa-rainbow"></i> Pelangi</button>
          </div>
        </div>

        <!-- Slide 4 -->
        <div class="slide" data-index="3">
          <img src="foto4.jpg" alt="Kenangan 4" loading="lazy">
          <div class="slide-caption">
            <i class="fas fa-heart"></i> Sampai jumpa di pelukan
            <small>LDR takkan memisahkan kita</small>
          </div>
          <div class="slide-actions">
            <button class="love-btn-overlay" data-msg="💕 Aku menunggumu dengan sepenuh hati, Mia. Sampai kita bertemu lagi."><i class="fas fa-heart"></i> Tunggu</button>
            <button class="love-btn-overlay special" data-msg="🙏 Semoga cinta kita langgeng sampai i ahti, Frengky. Dalam doa selalu ada kamu."><i class="fas fa-hands-praying"></i> Doa</button>
          </div>
        </div>

        <!-- Navigation -->
        <button class="nav-btn prev" id="prevSlide"><i class="fas fa-chevron-left"></i></button>
        <button class="nav-btn next" id="nextSlide"><i class="fas fa-chevron-right"></i></button>
      </div>
    </div>

    <!-- Dots -->
    <div class="dots-container" id="dotsContainer">
      <button class="dot active" data-index="0"></button>
      <button class="dot" data-index="1"></button>
      <button class="dot" data-index="2"></button>
      <button class="dot" data-index="3"></button>
    </div>

    <!-- Ornamen Bawah -->
    <div class="ornament-bottom">
      <span class="line"></span>
      <i class="fas fa-heart"></i>
      <i class="fas fa-infinity" style="font-size:0.7rem;"></i>
      <i class="fas fa-heart"></i>
      <span class="line"></span>
    </div>

    <!-- ===== MUSIC ===== -->
    <div class="music-control">
      <button class="music-btn" id="playPauseBtn">
        <i class="fas fa-play" id="playIcon"></i>
      </button>
      <span class="music-label"><i class="fas fa-music"></i> Souqy</span>
      <button class="music-btn" id="volumeToggleBtn">
        <i class="fas fa-volume-up" id="volumeIcon"></i>
      </button>
    </div>

    <!-- ===== ROMANTIC OUTPUT ===== -->
    <div class="romantic-output" id="romanticOutput">
      <div class="love-message">
        <i class="fas fa-heart" style="color:#e8436e;"></i>  Klik tombol cinta di dalam foto  <i class="fas fa-heart" style="color:#e8436e;"></i>
      </div>
    </div>

  </div>

  <!-- ===== AUDIO ===== -->
  <audio id="romanticSong" loop preload="auto">
    <source src="https://raw.githubusercontent.com/frengkysihombing/Romantis/dcc093336370164fe887fee660895562a85185fb/Souqy.mp3" type="audio/mpeg">
  </audio>

  <script>
    (function() {

      // ========== BINTANG ==========
      const starsContainer = document.getElementById('starsContainer');
      for (let i = 0; i < 120; i++) {
        const star = document.createElement('div');
        star.className = 'star';
        star.style.left = Math.random() * 100 + '%';
        star.style.top = Math.random() * 100 + '%';
        star.style.setProperty('--duration', (2 + Math.random() * 4) + 's');
        star.style.width = (1 + Math.random() * 3) + 'px';
        star.style.height = star.style.width;
        star.style.animationDelay = (Math.random() * 5) + 's';
        starsContainer.appendChild(star);
      }

      // ========== HUJAN LOVE ==========
      const rainContainer = document.getElementById('rainContainer');
      const loveSymbols = ['❤️', '💕', '💖', '💗', '💘', '💝', '🌹', '🌸', '✨', '💞'];
      for (let i = 0; i < 40; i++) {
        const el = document.createElement('div');
        el.className = 'rain-heart';
        el.textContent = loveSymbols[Math.floor(Math.random() * loveSymbols.length)];
        el.style.left = Math.random() * 100 + '%';
        el.style.fontSize = (1 + Math.random() * 2.5) + 'rem';
        el.style.animationDuration = (8 + Math.random() * 15) + 's';
        el.style.animationDelay = (Math.random() * 12) + 's';
        el.style.opacity = 0.08 + Math.random() * 0.15;
        rainContainer.appendChild(el);
      }

      // ========== SLIDESHOW ==========
      const slides = document.querySelectorAll('.slide');
      const dots = document.querySelectorAll('.dot');
      const prevBtn = document.getElementById('prevSlide');
      const nextBtn = document.getElementById('nextSlide');
      let currentIndex = 0;
      let slideInterval;

      function goToSlide(index) {
        if (index < 0) index = slides.length - 1;
        if (index >= slides.length) index = 0;
        slides.forEach((s, i) => s.classList.toggle('active', i === index));
        dots.forEach((d, i) => d.classList.toggle('active', i === index));
        currentIndex = index;
      }

      function nextSlide() { goToSlide(currentIndex + 1); }
      function prevSlide() { goToSlide(currentIndex - 1); }

      prevBtn.addEventListener('click', (e) => { e.stopPropagation(); prevSlide(); resetInterval(); });
      nextBtn.addEventListener('click', (e) => { e.stopPropagation(); nextSlide(); resetInterval(); });
      dots.forEach(dot => {
        dot.addEventListener('click', function() {
          goToSlide(parseInt(this.getAttribute('data-index')));
          resetInterval();
        });
      });

      function startInterval() { slideInterval = setInterval(nextSlide, 5000); }
      function resetInterval() { clearInterval(slideInterval); startInterval(); }

      const container = document.getElementById('slideshowContainer');
      container.addEventListener('mouseenter', () => clearInterval(slideInterval));
      container.addEventListener('mouseleave', startInterval);
      container.addEventListener('touchstart', () => clearInterval(slideInterval));
      container.addEventListener('touchend', startInterval);
      startInterval();

      // ========== AUDIO ==========
      const audio = document.getElementById('romanticSong');
      const playBtn = document.getElementById('playPauseBtn');
      const playIcon = document.getElementById('playIcon');
      const volumeBtn = document.getElementById('volumeToggleBtn');
      const volumeIcon = document.getElementById('volumeIcon');
      let isPlaying = false, isMuted = false;

      function playAudio(showMsg = true) {
        audio.play().then(() => {
          isPlaying = true;
          playIcon.className = 'fas fa-pause';
          if (showMsg) showLoveBurst('🎵 Sedang memutar lagu Souqy 💖');
        }).catch(() => {
          playIcon.className = 'fas fa-play';
          isPlaying = false;
        });
      }

      setTimeout(() => playAudio(false), 500);
      document.addEventListener('click', function first() {
        if (!isPlaying) playAudio(true);
        document.removeEventListener('click', first);
        document.removeEventListener('touchstart', first);
      }, { once: true });
      document.addEventListener('touchstart', function firstTouch() {
        if (!isPlaying) playAudio(true);
        document.removeEventListener('click', firstTouch);
        document.removeEventListener('touchstart', firstTouch);
      }, { once: true });

      playBtn.addEventListener('click', function(e) {
        e.stopPropagation();
        if (isPlaying) { audio.pause(); playIcon.className = 'fas fa-play'; isPlaying = false; }
        else { playAudio(true); }
      });

      volumeBtn.addEventListener('click', function(e) {
        e.stopPropagation();
        if (isMuted) { audio.muted = false; volumeIcon.className = 'fas fa-volume-up'; isMuted = false; }
        else { audio.muted = true; volumeIcon.className = 'fas fa-volume-mute'; isMuted = true; }
      });
      audio.volume = 0.6;

      // ========== FUNGSI HUJAN LOVE ==========
      function showLoveBurst(msg) {
        const output = document.getElementById('romanticOutput');
        output.innerHTML = '';
        const div = document.createElement('div');
        div.className = 'love-message';
        div.innerHTML = `<i class="fas fa-heart" style="color:#e8436e;"></i> ${msg} <i class="fas fa-heart" style="color:#e8436e;"></i>`;
        output.appendChild(div);

        const emojis = ['❤️', '💕', '💖', '💗', '💘', '💝', '🌹', '🌸', '✨', '💞', '💓', '🥰', '😍', '💋'];
        const colors = ['#e8436e', '#ff6b8a', '#ff8da1', '#ffb6c1', '#d65f7a', '#ff4d7a', '#ff2d55'];

        for (let i = 0; i < 60; i++) {
          setTimeout(() => {
            const el = document.createElement('div');
            el.className = 'rain-burst';
            el.textContent = emojis[Math.floor(Math.random() * emojis.length)];
            el.style.left = (5 + Math.random() * 90) + '%';
            el.style.top = (5 + Math.random() * 90) + '%';
            const tx = (Math.random() * 600 - 300);
            const ty = (Math.random() * -600 - 100);
            el.style.setProperty('--tx', tx + 'px');
            el.style.setProperty('--ty', ty + 'px');
            el.style.fontSize = (1.5 + Math.random() * 4) + 'rem';
            el.style.color = colors[Math.floor(Math.random() * colors.length)];
            el.style.textShadow = '0 0 30px rgba(232,67,110,0.2)';
            document.body.appendChild(el);
            setTimeout(() => el.remove(), 2000);
          }, i * 25);
        }

        const floatEmojis = ['💖', '✨', '💕', '🌟', '🥰', '💞', '🌹', '💗', '💘', '😍'];
        for (let i = 0; i < 25; i++) {
          setTimeout(() => {
            const em = document.createElement('div');
            em.className = 'floating-emoji';
            em.textContent = floatEmojis[Math.floor(Math.random() * floatEmojis.length)];
            em.style.left = (5 + Math.random() * 90) + '%';
            em.style.top = (10 + Math.random() * 80) + '%';
            em.style.fontSize = (1.5 + Math.random() * 3) + 'rem';
            em.style.color = colors[Math.floor(Math.random() * colors.length)];
            document.body.appendChild(em);
            setTimeout(() => em.remove(), 2800);
          }, i * 50);
        }

        if (!isPlaying) playAudio(false);
      }

      // ========== TOMBOL ==========
      document.addEventListener('click', function(e) {
        const btn = e.target.closest('.love-btn-overlay');
        if (btn) {
          e.stopPropagation();
          e.preventDefault();
          const msg = btn.getAttribute('data-msg') || '💖 Cinta abadi untuk Mia & Frengky 💖';
          showLoveBurst(msg);
        }
      });

      // ========== PESAN DEFAULT ==========
      setTimeout(() => {
        showLoveBurst('💕 Klik tombol cinta di dalam foto untuk pesan romantis 💕');
      }, 800);

    })();
  </script>
</body>
</html>
